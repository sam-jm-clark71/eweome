  <style>
    /* ================================================================
       VARIABLES & RESET
    ================================================================ */
    :root {
      --green-50:   #EAF3DE;
      --green-100:  #C0DD97;
      --green-600:  #3B6D11;
      --green-800:  #27500A;
      --amber-50:   #FAEEDA;
      --amber-100:  #FAC775;
      --amber-600:  #633806;
      --amber-700:  #854F0B;
      --red-50:     #FCEBEB;
      --red-600:    #A32D2D;
      --red-800:    #791F1F;

      --text-1:     #111111;
      --text-2:     #555555;
      --text-3:     #999999;
      --border:     rgba(0,0,0,0.10);
      --surface:    #F5F5F0;
      --bg:         #FFFFFF;
      --radius-sm:  8px;
      --radius-md:  12px;
      --radius-lg:  16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-1:   #F0F0F0;
        --text-2:   #AAAAAA;
        --text-3:   #666666;
        --border:   rgba(255,255,255,0.12);
        --surface:  #1C1C1E;
        --bg:       #111111;
        --green-50: #162308;
        --amber-50: #261A06;
        --red-50:   #26080A;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface);
      color: var(--text-1);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ================================================================
       APP SHELL
    ================================================================ */
    #app {
      max-width: 480px;
      margin: 0 auto;
      height: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .screen {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 72px;
    }

    /* ================================================================
       BOTTOM NAV
    ================================================================ */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: var(--bg);
      border-top: 0.5px solid var(--border);
      display: flex;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .nav-item {
      flex: 1;
      border: none;
      background: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      font-size: 10px;
      color: var(--text-3);
      cursor: pointer;
      transition: color 0.15s;
      padding-bottom: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active { color: var(--green-600); }
    .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }

    /* ================================================================
       SCREEN HEADER
    ================================================================ */
    .screen-header {
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 24px;
      line-height: 1;
      color: var(--text-2);
      cursor: pointer;
      padding: 0 8px 0 0;
      -webkit-tap-highlight-color: transparent;
    }

    .screen-title { font-size: 16px; font-weight: 500; color: var(--text-1); }

    .step-dots { display: flex; gap: 5px; margin-left: auto; }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
    .sdot.active { background: var(--green-600); }
    .sdot.done   { background: var(--green-100); }

    /* ================================================================
       INPUTS
    ================================================================ */
    .input {
      width: 100%;
      padding: 11px 13px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      color: var(--text-1);
      background: var(--bg);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--green-600); }
    textarea.input { resize: none; line-height: 1.5; }

    .field-label {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 7px;
      display: block;
    }

    /* Big amount input */
    .amount-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 28px 16px 16px;
    }
    .amount-symbol { font-size: 32px; font-weight: 300; color: var(--text-2); }
    .amount-input {
      font-size: 40px;
      font-weight: 500;
      text-align: center;
      border: none;
      border-bottom: 2px solid var(--green-600);
      border-radius: 0;
      width: 180px;
      padding: 4px 0;
      background: transparent;
      color: var(--text-1);
      outline: none;
      font-family: inherit;
    }
    .amount-input::placeholder { color: var(--text-3); }

    /* ================================================================
       BUTTONS
    ================================================================ */
    .btn {
      padding: 13px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      font-family: inherit;
      width: 100%;
      display: block;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; transform: scale(0.98); }
    .btn-green  { background: var(--green-100);  color: var(--green-800); }
    .btn-amber  { background: var(--amber-100);  color: var(--amber-600); }
    .btn-red    { background: var(--red-50);      color: var(--red-600); border: 0.5px solid rgba(162,45,45,0.2); }
    .btn-ghost  { background: var(--surface);    color: var(--text-1); border: 0.5px solid var(--border); }

    /* ================================================================
       LIST ITEMS
    ================================================================ */
    .list-item {
      padding: 13px 16px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 13px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .list-item:active { background: var(--surface); }

    /* ================================================================
       AVATAR
    ================================================================ */
    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500;
      flex-shrink: 0;
      background: var(--green-50);
      color: var(--green-600);
    }
    .avatar.amber { background: var(--amber-50); color: var(--amber-600); }

    /* ================================================================
       CARD (detail view)
    ================================================================ */
    .card {
      background: var(--surface);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 0.5px solid var(--border);
    }
    .card-row {
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }
    .card-row:last-child { border-bottom: none; }
    .card-key { font-size: 13px; color: var(--text-2); flex-shrink: 0; }
    .card-val { font-size: 14px; font-weight: 500; text-align: right; }

    /* ================================================================
       STATUS TAGS
    ================================================================ */
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .tag-green  { background: var(--green-50);  color: var(--green-600); }
    .tag-amber  { background: var(--amber-50);  color: var(--amber-700); }
    .tag-red    { background: var(--red-50);    color: var(--red-600); }

    /* ================================================================
       NOTIFICATION BANNER
    ================================================================ */
    .notif-banner {
      margin: 10px 14px;
      padding: 11px 13px;
      background: var(--amber-50);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 0.5px solid var(--amber-100);
      -webkit-tap-highlight-color: transparent;
    }
    .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #BA7517; flex-shrink: 0; }

    /* ================================================================
       HOME CIRCLES
    ================================================================ */
    .circle-btn {
      width: min(46vw, 160px); height: min(46vw, 160px);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .circle-btn:active { transform: scale(0.93); }
    .circle-green { background: var(--green-100); }
    .circle-amber { background: var(--amber-100); }
    .circle-label {
      font-size: 15px; font-weight: 500;
      text-align: center; max-width: 100px; line-height: 1.25;
    }
    .circle-green .circle-label { color: var(--green-800); }
    .circle-amber .circle-label { color: var(--amber-600); }
    .circle-sub { font-size: 10px; text-align: center; max-width: 90px; }
    .circle-green .circle-sub { color: var(--green-600); }
    .circle-amber .circle-sub { color: var(--amber-700); }

    /* ================================================================
       POSITION SCREEN
    ================================================================ */
    .balance-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px;
    }
    .balance-card { border-radius: var(--radius-md); padding: 14px; text-align: center; }
    .balance-card.green { background: var(--green-50); }
    .balance-card.red   { background: var(--red-50); }
    .balance-label  { font-size: 11px; margin-bottom: 4px; }
    .balance-card.green .balance-label { color: var(--green-600); }
    .balance-card.red   .balance-label { color: var(--red-600); }
    .balance-amount { font-size: 22px; font-weight: 500; }
    .balance-card.green .balance-amount { color: var(--green-800); }
    .balance-card.red   .balance-amount { color: var(--red-800); }

    /* ================================================================
       SIGN-IN SCREEN
    ================================================================ */
    .signin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 40px 28px;
      text-align: center;
      gap: 24px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 15px;
      font-family: inherit;
      color: var(--text-1);
      width: 100%;
      max-width: 280px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .google-btn:hover { background: var(--surface); }

    /* ================================================================
       MISC
    ================================================================ */
    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 100%; color: var(--text-2); font-size: 14px;
    }

    .empty {
      padding: 56px 28px;
      text-align: center;
      color: var(--text-2);
      font-size: 14px;
      line-height: 1.8;
    }

    .success-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 28px; text-align: center; gap: 14px;
      min-height: 450px;
    }

    .divider { border: none; border-top: 0.5px solid var(--border); }

    .pending-counter {
      min-width: 18px; height: 18px;
      background: #BA7517;
      color: white;
      border-radius: 9px;
      font-size: 10px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      margin-left: auto;
    }
  </style>
</head>

function fmt(n)   { return '\u00a3' + parseFloat(n || 0).toFixed(2); }
function today()  { return new Date().toISOString().split('T')[0]; }

function fmtDate(d) {
  if (!d) return '';
  const [y, m, dy] = d.split('-');
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(dy)} ${M[parseInt(m) - 1]} ${y}`;
}

function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function tagForStatus(status) {
  const map = {
    pending:            ['tag-amber', 'Pending'],
    queried:            ['tag-amber', 'Queried'],
    agreed:             ['tag-green', 'Agreed'],
    accepted:           ['tag-green', 'Agreed'],
    settlement_pending: ['tag-amber', 'Settlement pending'],
    settled:            ['tag-green', 'Settled'],
    rejected:           ['tag-red',   'Rejected']
  };
  const [cls, label] = map[status] || ['tag-amber', status];
  return `<span class="tag ${cls}">${label}</span>`;
}

/* ================================================================
   NAVIGATION
================================================================ */
function go(screen) {
  A.screen = screen;
  render();
  const el = document.querySelector('.screen');
  if (el) el.scrollTop = 0;
}

const HOME_SCREENS = [
  'home','ew_who','ew_amt','ew_date','ew_desc','ew_conf','ew_sent',
  'io_who','io_amt','io_date','io_desc','io_conf','io_sent',
  'req_detail','q_form','q_sent','new_conn'
];
const POS_SCREENS = ['position','pos_detail','pos_history','simplify'];
const PENDING_SCREENS = ['pending'];

/* ================================================================
   RENDER ENGINE
================================================================ */
function render() {
  const app = document.getElementById('app');
  const showNav = !['loading','signin'].includes(A.screen);
  const pendingCount = A.pendingClaims.length;

  const content = {
    loading:    renderLoading,
    signin:     renderSignIn,
    home:       renderHome,
    ew_who:     renderWho,
    ew_amt:     renderAmount,
    ew_date:    renderDate,
    ew_desc:    renderDesc,
    ew_conf:    renderConfirm,
    ew_sent:    renderSent,
    io_who:     renderWho,
    io_amt:     renderAmount,
    io_date:    renderDate,
    io_desc:    renderDesc,
    io_conf:    renderConfirm,
    io_sent:    renderSent,
    req_detail: renderReqDetail,
    q_form:     renderQueryForm,
    q_sent:     renderQuerySent,
    position:   renderPosition,
    pos_detail: renderPosDetail,
    pos_history: renderPosHistory,
    simplify:    renderSimplify,
    recurring:   renderRecurring,
    reject_form: renderRejectForm,
    pending:    renderPending,
    onboarding:      renderOnboarding,
    merge_accounts:  renderMergeAccounts,
    settings:   renderSettings,
    new_conn:   renderNewConn,
  }[A.screen] || renderLoading;

  if (!showNav) {
    app.innerHTML = content();
    return;
  }

  app.innerHTML = `
    <div class="screen" style="${A.screen==='home'?'display:flex;flex-direction:column;':''}">${content()}</div>
    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-item ${HOME_SCREENS.includes(A.screen) ? 'active' : ''}" onclick="go('home')">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 12L12 3l9 9"/>
          <path d="M5 10v10h5v-5h4v5h5V10"/>
        </svg>
        Home
      </button>
      <button class="nav-item ${POS_SCREENS.includes(A.screen) ? 'active' : ''}" onclick="go('position')">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2"  y="3"  width="6" height="18" rx="1"/>
          <rect x="9"  y="8"  width="6" height="13" rx="1"/>
          <rect x="16" y="12" width="6" height="9"  rx="1"/>
        </svg>
        My position
      </button>
      <button class="nav-item ${PENDING_SCREENS.includes(A.screen) ? 'active' : ''}" onclick="go('pending')" style="position:relative;${A.pendingClaims.length > 0 ? 'color:#BA7517;' : ''}">
        ${A.pendingClaims.length > 0 ? `<span style="position:absolute;top:6px;right:10px;min-width:16px;height:16px;background:#BA7517;color:white;border-radius:8px;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;padding:0 4px;">${A.pendingClaims.length}</span>` : (A.sentClaims.length > 0 ? `<span style="position:absolute;top:6px;right:10px;min-width:16px;height:16px;background:#888;color:white;border-radius:8px;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;padding:0 4px;">${A.sentClaims.length}</span>` : "")}
        <svg viewBox="0 0 24 24" aria-hidden="true" style="${A.pendingClaims.length > 0 ? 'stroke:#BA7517;' : ''}">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Pending
      </button>
      <button class="nav-item ${A.screen === 'settings' ? 'active' : ''}" onclick="go('settings')">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        Settings
      </button>
    </nav>`;
}

/* ================================================================
   SCREEN: LOADING

function renderLoading() {
  return `<div class="loading">Loading&hellip;</div>`;
}

    <div class="signin-screen">

      <div>
        <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:42px;letter-spacing:0.01em;color:var(--green-600);display:inline-block;transform:scaleY(1.1);transform-origin:center bottom;white-space:nowrap;">ewe-o-me</h1>
        <p style="font-size:13px;color:var(--text-2);margin-top:6px;">Log it. Track it. Settle it.</p>
      </div>
      ${mode === 'choose' ? `
        <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;">
          <button class="google-btn" style="background:#3B6D11;color:white;border-color:#3B6D11;font-size:15px;padding:14px;" onclick="A.signinMode='phone';render()">&#128222;&nbsp; Sign up / sign in with phone</button>
          <p style="font-size:11px;color:var(--text-3);text-align:center;margin:0;">Phone number is recommended — it's the most reliable way for others to find you.</p>
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="flex:1;height:0.5px;background:var(--border);"></div>
            <span style="font-size:11px;color:var(--text-3);">or sign in another way</span>
            <div style="flex:1;height:0.5px;background:var(--border);"></div>
          </div>
          <button class="google-btn" onclick="signIn()">${googleIcon()} Continue with Google</button>
          <button class="google-btn" onclick="A.signinMode='email';render()">&#9993;&nbsp; Continue with email</button>
        </div>` : ''}
      ${mode === 'email' ? `
        <div style="width:100%;max-width:280px;display:flex;flex-direction:column;gap:10px;">
          <input type="email" id="si-email" class="input" placeholder="Email address" aria-label="Email"/>
          <input type="password" id="si-pass" class="input" placeholder="Password" aria-label="Password"/>
          <button class="google-btn" onclick="signInEmail(false)">Sign in</button>
          <button class="google-btn" onclick="signInEmail(true)">Create account</button>
          <button style="background:none;border:none;font-size:13px;color:var(--text-2);cursor:pointer;" onclick="A.signinMode='choose';render()">&#8592; Back</button>
        </div>` : ''}
      ${mode === 'phone' ? `
        <div style="width:100%;max-width:280px;display:flex;flex-direction:column;gap:10px;">
          ${A.phoneStep === 'code' ? `
            <p style="font-size:13px;color:var(--text-2);text-align:center;">Enter the code sent to ${esc(A.phoneNumber)}</p>
            <input type="text" id="si-code" class="input" placeholder="6-digit code" inputmode="numeric" maxlength="6" aria-label="Verification code"/>
            <button class="google-btn" onclick="verifyCode()">Verify</button>
            <button style="background:none;border:none;font-size:13px;color:var(--text-2);cursor:pointer;" onclick="A.phoneStep='number';render()">&#8592; Back</button>
          ` : `
            <input type="tel" id="si-phone" class="input" placeholder="07700 900000 or +44 7700 900000" inputmode="tel" aria-label="Phone number"/>
            <div id="recaptcha-container"></div>
            <button class="google-btn" onclick="signInPhone()">Send code</button>
            <button style="background:none;border:none;font-size:13px;color:var(--text-2);cursor:pointer;" onclick="A.signinMode='choose';render()">&#8592; Back</button>
          `}
        </div>` : ''}
      ${A.signinError ? `<p style="font-size:13px;color:var(--red-600);text-align:center;max-width:260px;">${esc(A.signinError)}</p>` : ''}
    </div>`;
}

/* ================================================================
   SCREEN: HOME
================================================================ */
function renderHome() {
  checkDueClaims();
  if (A.dueClaims.length > 0 && A.screen === 'home') {
    setTimeout(() => go('recurring'), 400);
  }
  const pending  = A.pendingClaims;
  const hp       = pending.length > 0;
  const p        = pending[0];
  const padTop   = hp ? '14px' : '28px';

  return `
    <div style="padding:16px 16px 10px;display:flex;align-items:center;gap:12px;">
      ${sheepSvg(52)}
      <div style="flex:1;text-align:center;">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:var(--green-600);letter-spacing:0.01em;line-height:1;display:inline-block;transform:scaleY(1.1);transform-origin:center bottom;white-space:nowrap;">ewe-o-me</div>
      </div>
      <div style="font-size:11px;color:var(--text-2);line-height:1.5;text-align:right;flex-shrink:0;">Log it.<br>Track it.<br>Settle it.</div>
    </div>



    ${hp ? `
      <div onclick="go('pending')" style="margin:0 14px 2px;padding:12px 14px;background:#BA7517;border-radius:var(--radius-md);cursor:pointer;display:flex;align-items:center;gap:10px;">
        <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0;">${A.pendingClaims.length}</div>
        <div style="flex:1;"><div style="font-size:14px;font-weight:500;color:white;">Pending requests</div><div style="font-size:12px;color:rgba(255,255,255,0.85);margin-top:1px;">Tap to review</div></div>
        <div style="color:white;font-size:20px;">&#8250;</div>
      </div>
    ` : ''}

    <div style="display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;flex:1;padding:8px 16px;">
      <button class="circle-btn circle-green" onclick="startClaim('eweome')">
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <span style="font-size:19px;font-weight:700;letter-spacing:1px;color:#27500A;line-height:1.15;">YOU</span>
          <span style="font-size:19px;font-weight:700;letter-spacing:1px;color:#27500A;line-height:1.15;">OWE</span>
          <span style="font-size:19px;font-weight:700;letter-spacing:1px;color:#27500A;line-height:1.15;">ME</span>
        </div>
      </button>
      <button class="circle-btn circle-amber" onclick="startClaim('ioowe')">
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <span style="font-size:19px;font-weight:700;letter-spacing:1px;color:#412402;line-height:1.15;">I</span>
          <span style="font-size:19px;font-weight:700;letter-spacing:1px;color:#412402;line-height:1.15;">OWE</span>
          <span style="font-size:19px;font-weight:700;letter-spacing:1px;color:#412402;line-height:1.15;">YOU</span>
        </div>
      </button>
    </div>`;
}

function startClaim(type) {
  A.claim = { type, personId: null, personName: null, amount: '', date: today(), desc: '' };
  go(type === 'ewe-o-me' ? 'ew_who' : 'io_who');
}

/* ================================================================
   CLAIM FLOW HELPERS
================================================================ */
function dots(step, total) {
  return `<div class="step-dots" aria-label="Step ${step} of ${total}">
    ${Array.from({length: total}, (_, i) =>
      `<div class="sdot ${i < step-1 ? 'done' : i === step-1 ? 'active' : ''}"></div>`
    ).join('')}
  </div>`;
}

function hdr(title, back, step, total) {
  return `<div class="screen-header">
    <button class="back-btn" onclick="go('${back}')" aria-label="Back">&#8249;</button>
    <span class="screen-title">${title}</span>
    ${step ? dots(step, total) : ''}
  </div>`;
}

function pfx() { return A.claim.type === 'ioowe' ? 'io' : 'ew'; }

/* ================================================================
   SCREEN: WHO (step 1)
================================================================ */
function renderWho() {
  const io = A.claim.type === 'ioowe';
  const q  = io ? 'Who do you owe?' : 'Who owes you?';

  const isMulti = A.claim.type === 'ewe-o-me';
  const selected = A.claim.recipients || [];
  const connRows = A.connections.filter(c => c.id !== A.user.uid && c.uid !== A.user.uid).map(c => {
    const isSel = selected.some(r => r.id === c.id);
    return `<div class="list-item" onclick="toggleRecipient('${esc(c.id)}','${esc(c.name)}')" style="${isSel ? 'background:var(--green-50);' : ''}">
      <div class="avatar ${c.color || ''}">${initials(c.name)}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:15px;font-weight:500;">${esc(c.name)}</div>
        <div style="font-size:12px;color:var(--text-2);">${esc(c.email || '')}</div>
      </div>
      <div style="color:var(--text-3);font-size:20px;">${isMulti ? (isSel ? '&#10003;' : '&#43;') : '&#8250;'}</div>
    </div>`;
  }).join('');

  return `
    ${hdr(q, 'home', 1, 4)}
    ${isMulti && selected.length > 0 ? `<div style="padding:10px 16px;background:var(--green-50);display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);"><span style="font-size:13px;color:var(--green-600);font-weight:500;">${selected.length} selected: ${selected.map(r => esc(r.name)).join(', ')}</span><button class="btn btn-green" style="width:auto;padding:7px 14px;font-size:13px;" onclick="proceedMulti()">Continue &rarr;</button></div>` : ""}
    ${connRows || `<div class="empty">No connections yet.<br>Add your first one below.</div>`}
    <div class="list-item" onclick="go('new_conn')">
      <div class="avatar" style="background:var(--surface);color:var(--text-2);font-size:18px;">+</div>
      <div>
        <div style="font-size:15px;font-weight:500;color:var(--green-600);">New connection</div>
        <div style="font-size:12px;color:var(--text-2);">Add someone by email</div>
      </div>
    </div>`;
}

function toggleRecipient(id, name) {
  if (A.claim.type === 'ioowe') { selectPerson(id, name); return; }
  if (!A.claim.recipients) A.claim.recipients = [];
  const idx = A.claim.recipients.findIndex(r => r.id === id);
  if (idx >= 0) { A.claim.recipients.splice(idx, 1); } else { A.claim.recipients.push({id, name}); }
  render();
}

function proceedMulti() {
  if (!A.claim.recipients || A.claim.recipients.length === 0) return;
  A.claim.personId   = A.claim.recipients[0].id;
  A.claim.personName = A.claim.recipients[0].name;
  go('ew_amt');
}

function selectPerson(id, name) {
  if (id === A.user.uid) { alert("You can't send a claim to yourself."); return; }
  A.claim.personId    = id;
  A.claim.personName  = name;
  A._connNotFound     = false;
  A._connNotFoundName = '';
  go(pfx() + '_amt');
}

/* ================================================================
   SCREEN: AMOUNT (step 2)
================================================================ */
function renderAmount() {
  const io  = A.claim.type === 'ioowe';
  const lbl = io
    ? `How much do you owe ${esc(A.claim.personName)}?`
    : `How much does ${esc(A.claim.personName)} owe you?`;

  return `
    ${hdr(lbl, pfx()+'_who', 2, 4)}
    ${A._connNotFound ? `<div style="margin:10px 16px 0;padding:10px 12px;background:var(--amber-50);border-radius:var(--radius-sm);border:0.5px solid var(--amber-100);">
      <div style="font-size:12px;color:var(--amber-700);margin-bottom:8px;">&#9888; ${esc(A._connNotFoundName||'')} hasn't registered yet. You can still send the claim — share the app with them so they can join and see it.</div>
      <button onclick="inviteContact('${esc(A._connNotFoundName||'')}')" class="btn btn-ghost" style="font-size:12px;padding:7px 10px;width:auto;background:var(--amber-50);border-color:var(--amber-100);">Invite ${esc(A._connNotFoundName||'')} to ewe-o-me</button>
    </div>` : ""}
    <div class="amount-wrap">
      <span class="amount-symbol">&pound;</span>
      <input
        type="number"
        id="amt-in"
        class="amount-input"
        placeholder="0.00"
        step="0.01"
        inputmode="decimal"
        value="${esc(A.claim.amount)}"
        oninput="A.claim.amount=this.value"
        aria-label="Amount in pounds"
      />
    </div>
    <div style="padding:0 16px;">
      <button class="btn btn-green" onclick="fromAmount()">Next &rarr;</button>
    </div>`;
}

function fromAmount() {
  const el = document.getElementById('amt-in');
  if (el) A.claim.amount = el.value;
  if (!A.claim.amount || parseFloat(A.claim.amount) <= 0) {
    if (el) el.style.borderBottomColor = '#E24B4A';
    return;
  }
  go(pfx() + '_date');
}

/* ================================================================
   SCREEN: DATE (step 3)
================================================================ */
function renderDate() {
  return `
    ${hdr('When did this happen?', pfx()+'_amt', 3, 4)}
    <div style="padding:20px 16px;">
      <input
        type="date"
        id="date-in"
        class="input"
        value="${A.claim.date}"
        max="${today()}"
        oninput="A.claim.date=this.value"
        style="margin-bottom:12px;"
        aria-label="Date"
      />
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" style="font-size:12px;padding:9px;" onclick="setDate(0)">Today</button>
        <button class="btn btn-ghost" style="font-size:12px;padding:9px;" onclick="setDate(1)">Yesterday</button>
      </div>
    </div>
    <div style="padding:0 16px;">
      <button class="btn btn-green" onclick="fromDate()">Next &rarr;</button>
    </div>`;
}

function setDate(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  A.claim.date = d.toISOString().split('T')[0];
  const el = document.getElementById('date-in');
  if (el) el.value = A.claim.date;
}

function fromDate() {
  const el = document.getElementById('date-in');
  if (el) A.claim.date = el.value;
  go(pfx() + '_desc');
}

/* ================================================================
   SCREEN: DESCRIPTION (step 4)
================================================================ */
function renderDesc() {
  return `
    ${hdr("What's it for?", pfx()+'_date', 4, 4)}
    <div style="padding:20px 16px;">
      <textarea
        id="desc-in"
        class="input"
        style="height:80px;"
        placeholder="Brief description, e.g. dinner out, taxi, petrol…"
        oninput="A.claim.desc=this.value"
        aria-label="Description"
      >${esc(A.claim.desc)}</textarea>

async function sendMultiClaim() {
  const batch = db.batch();
  const credUid  = A.user.uid;
  const credName = A.userDoc?.displayName || A.user.displayName;
  for (const r of A.claim.recipients) {
    const ref = db.collection('claims').doc();
    batch.set(ref, {
      creditorUid: credUid, creditorName: credName,
      debtorUid: r.id, debtorName: r.name,
      amount: parseFloat(A.claim.amount), currency: 'GBP',
      onAccount: A.claim.onAccount || false,
      recurring: A.claim.recurring || false,
      recurrence: A.claim.recurring ? A.claim.recurrence : null,
      description: A.claim.desc, date: A.claim.date,
      type: 'ewe-o-me', status: 'pending',
      counterAmount: null, counterComment: null,
      participants: [credUid, r.id],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  try { await batch.commit(); go('ew_sent'); }
  catch(e) { alert('Error: ' + e.message); }
}

async function sendClaim() {
  if (A.claim.type === 'ewe-o-me' && A.claim.recipients && A.claim.recipients.length > 1) {
    await sendMultiClaim(); return;
  }
  const oneWeekAgo = new Date(); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
  const weekStr = oneWeekAgo.toISOString().split('T')[0];
  const allClaims = [...A.pendingClaims, ...A.sentClaims, ...A.ledger, ...A.settled];
  const dup = allClaims.find(c =>
    c.creditorUid === A.user.uid &&
    c.debtorUid === A.claim.personId &&
    parseFloat(c.amount) === parseFloat(A.claim.amount) &&
    (c.date || '') >= weekStr
  );
  if (dup) {
    const ok = confirm(
      'Heads up: you already sent ' + esc(A.claim.personName) + ' a claim for ' + fmt(A.claim.amount) +
      ' on ' + fmtDate(dup.date) + ' (' + (esc(dup.description)||'no description') + ').' +
      '\n\nIs this a duplicate? Press Cancel to go back, or OK to send anyway.'
    );
    if (!ok) return;
  }
  const io       = A.claim.type === 'ioowe';
  const credUid  = io ? A.claim.personId           : A.user.uid;
  const credName = io ? A.claim.personName          : (A.userDoc?.displayName || A.user.displayName);
  const debtUid  = io ? A.user.uid                 : A.claim.personId;
  const debtName = io ? (A.userDoc?.displayName || A.user.displayName) : A.claim.personName;

  try {
    await db.collection('claims').add({
      creditorUid:  credUid,
      creditorName: credName,
      debtorUid:    debtUid,
      debtorName:   debtName,
      amount:       parseFloat(A.claim.amount),
      currency:     'GBP',
      onAccount:    A.claim.onAccount || false,
      recurring:    A.claim.recurring || false,
      recurrence:   A.claim.recurring ? A.claim.recurrence : null,
      description:  A.claim.desc,
      date:         A.claim.date,
      type:         A.claim.type,
      status:       'pending',
      counterAmount:   null,
      counterComment:  null,
      participants:    [credUid, debtUid],
      nextDue: A.claim.recurring ? nextDueDate(A.claim.recurrence, A.claim.date) : null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    A._lastSentId = docRef ? docRef.id : null;
    go(pfx() + '_sent');
  } catch (e) {
    alert('Error sending claim. Please try again.\n\n' + e.message);
  }
}

function buildShareText(claim) {
  const io = claim.type === 'ioowe';
  const dir = io ? 'I owe you' : 'You owe me';
  const desc = claim.description ? ' for ' + claim.description : '';
  const date = claim.date ? ' (' + fmtDate(claim.date) + ')' : '';
  const onAcct = claim.onAccount ? ' No rush — just keeping track.' : '';
  return dir + ' ' + fmt(claim.amount) + desc + date + '.' + onAcct
    + '\n\nTracking this on ewe-o-me: https://eweome-41e0f.web.app';
}

function shareViaSystem(claimId) {
  const all = [...A.pendingClaims, ...A.sentClaims, ...A.ledger, ...(A.settled||[])];
  const claim = all.find(c => c.id === claimId);
  if (!claim) return;
  const text = buildShareText(claim);
  if (navigator.share) { navigator.share({ text }).catch(() => {}); }
  else window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function skipClaim(id) {
  const idx = A.pendingClaims.findIndex(c => c.id === id);
  if (idx >= 0) { const s = A.pendingClaims.splice(idx,1)[0]; A.pendingClaims.push(s); }
  const next = A.pendingClaims.find(c => c.id !== id);
  if (next) { A.selectedClaimId = next.id; go('req_detail'); } else go('pending');
}

function goNextPending() {
  const next = A.pendingClaims.find(c => c.id !== A.selectedClaimId);
  if (next) {
    A.selectedClaimId = next.id;
    go('req_detail');
  } else {
    go('home');
  }
}

async function acceptClaim(id) {
  try {
    await db.collection('claims').doc(id).update({
      status:    'agreed',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()

    goNextPending();
  } catch(e) { alert('Error: ' + e.message); }
}

async function acceptCounter(id, counterAmount) {
  try {
    await db.collection('claims').doc(id).update({
      status:    'agreed',
      amount:    parseFloat(counterAmount),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    goNextPending();
  } catch(e) { alert('Error: ' + e.message); }
}

async function rejectClaim(id) {
  try {
    await db.collection('claims').doc(id).update({
      status:    'rejected',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()

}

async function markSettled(id) {
  const claim = A.ledger.find(c => c.id === id);
  if (!claim) return;
  try {
    if (claim.creditorUid === A.user.uid) {
      await db.collection('claims').doc(id).update({
        status: 'settled',
        settledAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await db.collection('claims').doc(id).update({
        status: 'settlement_pending',
        settlementRequestedBy: A.user.uid,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()

/* ================================================================
   RECURRING CLAIMS
================================================================ */
function nextDueDate(recurrence, fromDate) {
  const d = fromDate ? new Date(fromDate) : new Date();
  if (recurrence.freq === 'weekly' || recurrence.freq === 'fortnightly') {
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const targetDay = days.indexOf(recurrence.day);
    const step = recurrence.freq === 'fortnightly' ? 14 : 7;
    const next = new Date(d);
    next.setDate(next.getDate() + step);
    const diff = (targetDay - next.getDay() + 7) % 7;
    next.setDate(next.getDate() + diff);
    return next.toISOString().split('T')[0];
  } else {
    const next = new Date(d);
    next.setMonth(next.getMonth() + 1);
    next.setDate(Math.min(recurrence.dayOfMonth, 28));
    return next.toISOString().split('T')[0];
  }
}

function checkDueClaims() {
  const todayStr = today();
  const all = [...A.ledger, ...A.settled];
  A.dueClaims = all.filter(c =>
    c.recurring && c.recurrence &&
    c.creditorUid === A.user.uid &&
    c.nextDue && c.nextDue <= todayStr &&
    !c.dueDismissed
  );
}

          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
            <span style="font-size:14px;font-weight:500;">${esc(c.debtorName)}</span>

    </div>`;

async function sendRecurring(originalId) {
  const c = A.dueClaims.find(x => x.id === originalId);
  if (!c) return;
  try {
    const nextDue = nextDueDate(c.recurrence, c.nextDue);
    const batch = db.batch();
    const newRef = db.collection('claims').doc();
    batch.set(newRef, {
      creditorUid: c.creditorUid, creditorName: c.creditorName,
      debtorUid: c.debtorUid, debtorName: c.debtorName,
      amount: c.amount, currency: 'GBP',
      onAccount: c.onAccount || false,
      recurring: true, recurrence: c.recurrence,
      nextDue,
      description: c.description, date: today(),
      type: c.type, status: 'pending',
      counterAmount: null, counterComment: null,
      participants: [c.creditorUid, c.debtorUid],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    batch.update(db.collection('claims').doc(originalId), {
      dueDismissed: true, nextDue,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await batch.commit();
    checkDueClaims();
    if (A.dueClaims.length > 0) render();
    else go('home');
  } catch(e) { alert('Error: ' + e.message); }
}

async function dismissDue(originalId) {
  const c = A.dueClaims.find(x => x.id === originalId);
  if (!c) return;
  try {
    const nextDue = nextDueDate(c.recurrence, c.nextDue);
    await db.collection('claims').doc(originalId).update({
      dueDismissed: true, nextDue,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    checkDueClaims();
    if (A.dueClaims.length > 0) render();
    else go('home');
  } catch(e) { alert('Error: ' + e.message); }
}

/* ================================================================
   DEBT NETTING ALGORITHM + SCREEN
================================================================ */
function computeSimplified() {
  const net = {};
  const addNet = (uid, name, amount) => {
    if (!net[uid]) net[uid] = { name, bal: 0 };
    net[uid].bal += amount;
  };
  A.ledger.forEach(c => {
    addNet(c.creditorUid, c.creditorName,  c.amount);
    addNet(c.debtorUid,   c.debtorName,   -c.amount);
  });
  const creditors = Object.entries(net).filter(([,v]) => v.bal >  0.005).map(([id,v]) => ({id, name:v.name, bal:v.bal}));
  const debtors   = Object.entries(net).filter(([,v]) => v.bal < -0.005).map(([id,v]) => ({id, name:v.name, bal:-v.bal}));
  creditors.sort((a,b) => b.bal - a.bal);
  debtors.sort((a,b)   => b.bal - a.bal);
  const payments = [];
  let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const cr = creditors[ci], dr = debtors[di];
    const amount = Math.min(cr.bal, dr.bal);
    if (amount > 0.005) payments.push({ from: dr.name, fromUid: dr.id, to: cr.name, toUid: cr.id, amount });
    cr.bal -= amount; dr.bal -= amount;
    if (cr.bal < 0.005) ci++;
    if (dr.bal < 0.005) di++;
  }
  return payments;
}

            ? '<div style="background:var(--red-50);border-radius:var(--radius-sm);padding:10px;border:0.5px solid rgba(162,45,45,0.2);width:100%;">'
              + '<div style="font-size:13px;color:var(--red-600);margin-bottom:8px;">Cancel this request?</div>'
              + '<div style="display:flex;gap:8px;">'
              + '<button onclick="confirmCancelClaim()" class="btn btn-red" style="padding:7px;font-size:12px;">Yes, cancel it</button>'
              + '<button onclick="abortCancelClaim()" class="btn btn-ghost" style="padding:7px;font-size:12px;">Keep it</button>'
              + '</div></div>'
            : '<button onclick="cancelClaim(\'' + c.id + '\')" class="btn btn-red" style="padding:7px;font-size:12px;flex:1;">Cancel</button>'
              + '<button onclick="shareViaSystem(\'' + c.id + '\')" class="btn btn-ghost" style="padding:7px;font-size:12px;flex:1;">Share</button>'
          )
          + '</div></div>';
      }).join('')}
    ` : ''}
    ${incoming.length === 0 && outgoing.length === 0 ? '<div class="empty">Nothing pending — all caught up!</div>' : ''}`;
}

function renderNewConn() {
  const back = A.claim.type ? pfx()+'_who' : 'settings';

async function pickFromContacts() {
  try {
    const contacts = await navigator.contacts.select(['name','tel','email'], { multiple: true });
    if (!contacts || contacts.length === 0) return;
    if (contacts.length === 1) {
      const c = contacts[0];
      const el = document.getElementById('nc-name'); if (el) el.value = (c.name&&c.name[0])||'';
      const el2 = document.getElementById('nc-email'); if (el2) el2.value = (c.tel&&c.tel[0])||(c.email&&c.email[0])||'';
    } else { await addMultipleContacts(contacts); }
  } catch(e) { console.log('Contact picker cancelled'); }
}

async function addMultipleContacts(contacts) {
  const existing = A.connections || [];
  const existingKeys = new Set(existing.map(c => (c.email||c.id||'').toLowerCase()));
  const toAdd = [];
  for (const c of contacts) {
    const name = (c.name&&c.name[0])||'';
    const tel  = (c.tel&&c.tel[0])||'';
    const email= (c.email&&c.email[0])||'';
    const key  = (tel||email||'').toLowerCase();
    if (!name||!key||existingKeys.has(key)) continue;
    existingKeys.add(key);
    toAdd.push({ id:'pending_'+Date.now()+'_'+toAdd.length, name, email:key, uid:null, color:(existing.length+toAdd.length)%2===0?'':'amber', addedAt:new Date().toISOString() });
  }
  if (toAdd.length===0) return;
  const merged = [...existing, ...toAdd];
  try {
    await db.collection('users').doc(A.user.uid).update({ connections: merged });
    A.connections = merged;
    const back = A.claim&&A.claim.type ? (A.claim.type==='ioowe'?'io_who':'ew_who') : 'settings';
    go(back);
  } catch(e) { alert('Error: '+e.message); }
}

async function addConnection() {
  const nameEl  = document.getElementById('nc-name');
  const emailEl = document.getElementById('nc-email');
  const name    = nameEl?.value.trim();
  const email   = emailEl?.value.trim().toLowerCase();

  if (!name || !email) {
    if (nameEl)  nameEl.style.borderColor  = '#E24B4A';
    if (emailEl) emailEl.style.borderColor = '#E24B4A';
    return;
  }

  try {
    // Look up whether they've already registered
    const isPhone = /^[+\d]/.test(email);
    const lookupKey = isPhone ? email.replace(/\s/g,'') : email.toLowerCase();
    let snap = await db.collection('users_by_phone').doc(lookupKey).get();
    if (!snap.exists) snap = await db.collection('users_by_email').doc(lookupKey).get();
    const theirUid = snap.exists ? snap.data().uid : null;
    if (!theirUid) {
      A._connNotFound = true;
    } else {
      A._connNotFound = false;
    }

    const conn = {
      id:      theirUid || ('pending_' + Date.now()),
      name,
      email,
      uid:     theirUid,
      color:   A.connections.length % 2 === 0 ? '' : 'amber',
      addedAt: new Date().toISOString()
    };

    const updated = [...A.connections.filter(c => c.email !== email), conn];
    await db.collection('users').doc(A.user.uid).update({ connections: updated });
    A.connections = updated;

    if (A.claim.type) {
      A.claim.personId   = conn.id;
      A.claim.personName = conn.name;
      go(pfx() + '_amt');
    } else {
      go('settings');
    }
  } catch(e) {
    alert('Error adding connection.\n\n' + e.message);
  }
}

/* ================================================================
   FIREBASE AUTH
================================================================ */
function inviteContact(name) {
  const text = (name ? name + ', ' : '') + "I'd like to add you as a contact on ewe-o-me, an app I use to track who owes what to whom. Join here: https://eweome-41e0f.web.app";
  if (navigator.share) { navigator.share({ text }).catch(() => {}); }
  else window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function autoFormatPhone(el) {
  let v = el.value.trim();
  if (v.startsWith('0') && !v.startsWith('00')) el.value = '+44 ' + v.slice(1);
}

function normalisePhone(raw) {
  let v = (raw||'').trim().replace(/[\s\-().]/g,'');
  if (v.startsWith('00')) v = '+' + v.slice(2);
  if (v.startsWith('0') && !v.startsWith('00')) v = '+44' + v.slice(1);
  return v;
}

async function signInEmail(isNew) {
  A.signinError = '';
  const email = document.getElementById('si-email')?.value.trim();
  const pass  = document.getElementById('si-pass')?.value;
  if (!email || !pass) { A.signinError = 'Please enter your email and password.'; render(); return; }
  try {
    if (isNew) await auth.createUserWithEmailAndPassword(email, pass);
    else       await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) { A.signinError = e.message.replace('Firebase: ','').replace(/ \(auth\/.*\)\.?/,''); render(); }
}

async function signInPhone() {
  A.signinError = '';
  const rawPhone = document.getElementById('si-phone')?.value.trim();
  if (!rawPhone) { A.signinError = 'Please enter your phone number.'; render(); return; }
  const phone = normalisePhone(rawPhone);
  try {
    if (!A._phoneVerifier) A._phoneVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
    A.phoneNumber = phone;
    A._confirmResult = await auth.signInWithPhoneNumber(phone, A._phoneVerifier);
    A.phoneStep = 'code'; render();
  } catch(e) { A.signinError = 'Could not send code. Check the number and try again.'; A._phoneVerifier = null; render(); }
}

async function verifyCode() {
  A.signinError = '';
  const code = document.getElementById('si-code')?.value.trim();
  if (!code) { A.signinError = 'Please enter the code.'; render(); return; }
  try { await A._confirmResult.confirm(code); }
  catch(e) { A.signinError = 'Incorrect code. Please try again.'; render(); }
}

async function signIn() {
  // Use native Android bridge if available
  if (window.isAndroidApp && window.AndroidBridge) {
    window.AndroidBridge.startGoogleSignIn();
    return;
  }
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
  } catch(e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      await auth.signInWithRedirect(provider);
    } else {
      A.signinError = 'Sign-in failed. Please try again.';
      render();
    }
  }
}

// Called by Android native after successful Google Sign-In
window.handleNativeGoogleSignIn = async function(idToken) {
  try {
    const credential = firebase.auth.GoogleAuthProvider.credential(idToken);
    await auth.signInWithCredential(credential);
  } catch(e) {
    A.signinError = 'Sign-in failed: ' + e.message;
    render();
  }
};

window.handleNativeGoogleSignInError = function(msg) {
  A.signinError = 'Google sign-in failed. Please try phone or email instead.';
  render();
};

function doSignOut() {
  A._unsubs.forEach(fn => fn());
  A._unsubs = [];
  A.signinMode = 'choose'; A.phoneStep = 'number'; A.signinError = ''; A._phoneVerifier = null;
  auth.signOut();
}

/* ================================================================
   FIRESTORE: USER SETUP
================================================================ */
async function ensureUserDoc(fbUser) {
  const ref  = db.collection('users').doc(fbUser.uid);
  const snap = await ref.get();

  if (!snap.exists) {
    const displayName = fbUser.displayName || fbUser.email || fbUser.phoneNumber || 'User';
    const data = {
      displayName,
      email:    fbUser.email    || null,
      phone:    fbUser.phoneNumber || null,
      photoURL: fbUser.photoURL || null,
      connections: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    await ref.set(data);
    if (fbUser.email) {
      await db.collection('users_by_email').doc(fbUser.email.toLowerCase()).set({ uid: fbUser.uid, displayName });
      await db.collection('users_by_phone').doc(fbUser.email.toLowerCase()).set({ uid: fbUser.uid, displayName });
    }
    if (fbUser.phoneNumber) {
      const pn = fbUser.phoneNumber.replace(/\s/g,'');
      await db.collection('users_by_phone').doc(pn).set({ uid: fbUser.uid, displayName });
      await db.collection('users_by_email').doc(pn).set({ uid: fbUser.uid, displayName });
    }
    if (!fbUser.phoneNumber) A.needsOnboarding = true;
  }
}

/* ================================================================
   FIRESTORE: REAL-TIME LISTENERS
================================================================ */
function subscribeToData(uid) {
  // Clean up previous listeners
  A._unsubs.forEach(fn => fn());
  A._unsubs = [];

  // User doc (connections)
  const u1 = db.collection('users').doc(uid)
    .onSnapshot(snap => {
      if (snap.exists) {
        A.userDoc      = snap.data();
        A.connections  = snap.data().connections || [];
      }
      if (!['loading','signin'].includes(A.screen)) render();
    });
  A._unsubs.push(u1);

  // All claims involving this user — real-time
  const u2 = db.collection('claims')
    .where('participants', 'array-contains', uid)
    .orderBy('createdAt', 'desc')
    .onSnapshot(snap => {
      const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // Auto-add connections from claims
      const connIds = new Set((A.connections||[]).map(c => c.id));
      const toAdd = [];
      all.forEach(c => {
        if (c.creditorUid === uid && !connIds.has(c.debtorUid) && c.debtorUid && c.debtorUid !== uid) {
          connIds.add(c.debtorUid);
          toAdd.push({ id: c.debtorUid, name: c.debtorName, email: '', uid: c.debtorUid, color: toAdd.length % 2 === 0 ? '' : 'amber', addedAt: new Date().toISOString() });
        } else if (c.debtorUid === uid && !connIds.has(c.creditorUid) && c.creditorUid && c.creditorUid !== uid) {
          connIds.add(c.creditorUid);
          toAdd.push({ id: c.creditorUid, name: c.creditorName, email: '', uid: c.creditorUid, color: toAdd.length % 2 === 0 ? '' : 'amber', addedAt: new Date().toISOString() });
        }
      const cleanedConns = (A.connections||[]).filter(c => c.id !== uid && c.uid !== uid);
      if (cleanedConns.length < (A.connections||[]).length) {
        db.collection('users').doc(uid).update({ connections: cleanedConns }).catch(()=>{});
        A.connections = cleanedConns;
      }
      });
      if (toAdd.length > 0) {
        const merged = [...(A.connections||[]), ...toAdd];
        db.collection('users').doc(uid).update({ connections: merged }).catch(() => {});
        A.connections = merged;
      }

      // Incoming & needs my action (including rejected claims the creditor hasn't dismissed)
      A.pendingClaims = all.filter(c =>
        (c.status === 'pending'            && c.debtorUid   === uid) ||
        (c.status === 'queried'            && c.creditorUid === uid) ||
        (c.status === 'settlement_pending' && c.creditorUid === uid) ||
        (c.status === 'rejected'           && c.creditorUid === uid && !c.creditorDismissed)
      );

      // Outgoing awaiting response
      A.sentClaims = all.filter(c =>
        ((c.status === 'pending'  && c.creditorUid === uid) ||
        (c.status === 'queried'  && c.debtorUid   === uid)) &&
        c.status !== 'cancelled'
      );

      // Outstanding agreed debts
      A.ledger = all.filter(c => c.status === 'agreed' || c.status === 'accepted');

      // Fully settled history
      A.settled = all.filter(c => c.status === 'settled');

      if (!['loading','signin'].includes(A.screen)) render();
    });
  A._unsubs.push(u2);
}

/* ================================================================
   BOOTSTRAP
================================================================ */
auth.onAuthStateChanged(async fbUser => {
  if (fbUser) {
    A.user = fbUser;
    // Check if this phone-auth account matches an existing account's stored phone
    if (fbUser.phoneNumber && !fbUser.email) {
      const pn = fbUser.phoneNumber.replace(/\s/g,'');
      const snap = await db.collection('users_by_phone').doc(pn).get().catch(() => null);
      if (snap && snap.exists && snap.data().uid !== fbUser.uid) {
        // Phone matches a different existing account — show merge prompt
        A.mergeUid = snap.data().uid;
        A.mergeName = snap.data().displayName || '';
        go('merge_accounts');
        return;
      }
    }
    await ensureUserDoc(fbUser);
    subscribeToData(fbUser.uid);
    if (A.needsOnboarding) go('onboarding');
    else go('home');
  } else {
    A.user        = null;
    A.userDoc     = null;
    A.connections = [];
    A.pendingClaims = A.sentClaims = A.ledger = [];
    go('signin');
  }
});

// Handle Google redirect result — critical for Android WebView
auth.getRedirectResult().then(result => {
  if (result && result.user) {
    console.log('Redirect sign-in successful:', result.user.email);
  }
}).catch(e => {
  if (e.code !== 'auth/no-auth-event') {
    console.warn('Redirect auth error:', e.code, e.message);
  }
});

// Initial paint while Firebase checks auth state
render();
</script>
