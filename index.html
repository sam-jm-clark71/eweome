    /* ================================================================
       VARIABLES & RESET
    ================================================================ */
    :root {

    /* ================================================================
       APP SHELL
    ================================================================ */

<script>

/* ================================================================
   CONNECTION ENRICHMENT
================================================================ */
async function enrichConnectionsFromPhoneLookup(uid) {
  const conns = A.connections || [];
  const needsPhone = conns.filter(c => {
    const effectiveUid = c.uid || c.id;
    return effectiveUid && !effectiveUid.startsWith('pending_') && !c.phone && !c.email;
  });
  if (needsPhone.length === 0) return;
  let updated = false;
  for (const c of needsPhone) {
    const effectiveUid = c.uid || c.id;
    try {
      const snap = await db.collection('users_by_phone').where('uid','==',effectiveUid).limit(1).get();
      if (!snap.empty) {
        const idx = A.connections.findIndex(x => x.id === c.id);
        if (idx >= 0) { A.connections[idx].phone = snap.docs[0].id; updated = true; }
      }
    } catch(e) {}
  }
  if (updated) {
    await db.collection('users').doc(uid).update({ connections: A.connections }).catch(()=>{});
    render();
  }
}

/* ================================================================
   PUSH NOTIFICATIONS
================================================================ */
// Called by Android APK after sign-in to save native FCM token
// Also retry on page load in case user was already signed in
window.addEventListener('load', () => {
  setTimeout(() => {
    const user = firebase.auth().currentUser;
    if (user && window.AndroidBridge) {
      try { window.AndroidBridge.saveFcmToken(user.uid); }
      catch(e) {}
    }
  }, 2000);
});

window.saveNativeFcmToken = async function(uid, token) {
  if (!uid || !token) return;
  try {
    await db.collection('users').doc(uid).update({ fcmToken: token, fcmUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    console.log('Native FCM token saved for', uid);
  } catch(e) { console.log('Could not save native FCM token:', e.message); }
};

async function requestNotificationPermission(uid) {
  // Skip if this is the APK (handled natively)
  if (window.AndroidBridge) return;
  if (!('Notification' in window)) return;
  if (Notification.permission === 'denied') return;
  try {
    const permission = Notification.permission === 'granted'
      ? 'granted'
      : await Notification.requestPermission();
    if (permission !== 'granted') return;
    // Register service worker for background push
    if ('serviceWorker' in navigator) {
      await navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(e => 
        console.log('SW registration failed:', e.message));
    }
    if (!messaging) return;
    const token = await messaging.getToken({ vapidKey: VAPID_KEY });
    if (token) {
      await db.collection('users').doc(uid).update({ fcmToken: token, fcmUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      console.log('Web push token saved:', token.slice(0,20) + '...');
    }
  } catch(e) { console.log('Notification setup failed:', e.message); }
}

async function sendPushNotification(toUid, title, body) {
  if (!toUid) { console.log('sendPushNotification: no toUid'); return; }
  try {
    const ref = await db.collection('notifications').add({
      toUid, title, body,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      sent: false
    });
    console.log('Notification queued:', ref.id, 'to:', toUid, 'title:', title);
  } catch(e) { console.log('Could not queue notification:', e.message); }
}

// Foreground message listener set up after messaging init

/* ================================================================
   TOAST & MODAL HELPERS
================================================================ */
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function showModal(msg, buttons) {
  const overlay = document.getElementById('modal-overlay');
  const msgEl   = document.getElementById('modal-msg');
  const btnsEl  = document.getElementById('modal-btns');
  if (!overlay) return;
  msgEl.innerHTML = msg;
  btnsEl.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.textContent = b.label;
    btn.className = 'btn ' + (b.style||'btn-ghost');
    btn.style.cssText = 'padding:9px 16px;font-size:13px;';
    btn.onclick = () => { overlay.style.display = 'none'; b.action(); };
    btnsEl.appendChild(btn);
  });
  overlay.style.display = 'flex';
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.style.display = 'none';
}

function isIOS()     { return /iP(hone|ad|od)/.test(navigator.userAgent); }
function isAndroid() { return /Android/.test(navigator.userAgent); }
function isAPK()     { return !!window.AndroidBridge; }
function isSafari()  { return /^((?!chrome|android).)*safari/i.test(navigator.userAgent); }
function copyToClipboard(text) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => copyFallback(text));
  } else {
    copyFallback(text);
  }
}
function copyFallback(text) {
  try {
    const el = document.createElement('textarea');
    el.value = text;
    el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(el);
    el.focus(); el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('Copied!');
  } catch(e) { showToast('Could not copy — please copy manually.'); }
}

function fmt(n)   { return '\u00a3' + parseFloat(n || 0).toFixed(2); }
function remainingAmount(c) { return Math.max(0, (c.amount || 0) - (c.amountPaid || 0)); }
function today()  { return new Date().toISOString().split('T')[0]; }

function fmtDate(d) {
  if (!d) return '';
  const [y, m, dy] = d.split('-');
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(dy)} ${M[parseInt(m) - 1]} ${y}`;
}

function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function tagForStatus(status) {
  const map = {
    pending:            ['tag-amber', 'Pending'],
    queried:            ['tag-amber', 'Queried'],
    agreed:             ['tag-green', 'Agreed'],
    accepted:           ['tag-green', 'Agreed'],
    settlement_pending: ['tag-amber', 'Settlement pending'],
    settled:            ['tag-green', 'Settled'],
    rejected:           ['tag-red',   'Rejected']
  };
  const [cls, label] = map[status] || ['tag-amber', status];
  return `<span class="tag ${cls}">${label}</span>`;
}

function go(screen) {
  A.screen = screen;
  // Save stable screens for refresh restore
  const restorable = ['home','position','pending','all_connections','notes','help','groups'];
  if (restorable.includes(screen)) {
    try { localStorage.setItem('eweome_last_screen', screen); } catch(e) {}
  }
  // Push to browser history so Android back gesture/button has something to work with
  try { history.pushState({ screen }, '', '#' + screen); } catch(e) {}
  render();
  const el = document.querySelector('.screen');
  if (el) el.scrollTop = 0;
}

// Called by Android WebView when hardware/gesture back is pressed
// The Kotlin code needs: override fun onBackPressed() { if (!webView.evaluateJavascript("window.onBackPressed()", null)) super.onBackPressed() }
window.onBackPressed = function() {
  const backMap = {
    req_detail: 'home', pos_detail: 'position', pos_history: 'position',
    group_detail: 'groups', group_new: 'groups', group_expense: 'group_detail',
    group_settle_preview: 'group_detail', partial_payment: 'req_detail',
    simplification_detail: 'home', q_form: 'req_detail', all_connections: 'home',
    all_history: 'home', find_friends: 'home', notes: 'home', help: 'home',
    settings: 'home', search: 'home',
  };
  const noBack = ['signin','loading','welcome','whats_new','activity_digest','merge_accounts','name_prompt','onboarding'];
  if (noBack.includes(A.screen)) return false; // let system handle (exit or do nothing)
  const dest = backMap[A.screen];
  if (dest) { go(dest); return true; }
  if (['home','position','pending','groups'].includes(A.screen)) return false; // exit app
  go('home'); return true;
};

          <button class="google-btn" onclick="signInEmail(true)">Create account</button>
          <button style="background:none;border:none;font-size:13px;color:var(--text-2);cursor:pointer;" onclick="A.signinMode='choose';render()">&#8592; Back</button>
        </div>` : ''}
      ${mode === 'phone' ? `
        <div style="width:100%;max-width:280px;display:flex;flex-direction:column;gap:10px;">
          ${A.phoneStep === 'code' ? `
            <p style="font-size:13px;color:var(--text-2);text-align:center;">Enter the code sent to ${esc(A.phoneNumber)}</p>
            <input type="text" id="si-code" class="input" placeholder="6-digit code" inputmode="numeric" maxlength="6" aria-label="Verification code"/>
            <button class="google-btn" onclick="verifyCode()">Verify</button>
            <button style="background:none;border:none;font-size:13px;color:var(--text-2);cursor:pointer;" onclick="A.phoneStep='number';render()">&#8592; Back</button>
          ` : `
            <input type="tel" id="si-phone" class="input" placeholder="07700 900000 or +44 7700 900000" inputmode="tel" aria-label="Phone number"/>
            <div id="recaptcha-container"></div>
            <button class="google-btn" onclick="signInPhone()">Send code</button>
            <button style="background:none;border:none;font-size:13px;color:var(--text-2);cursor:pointer;" onclick="A.signinMode='choose';render()">&#8592; Back</button>
          `}

      ${A.signinError ? `<p style="font-size:13px;color:var(--red-600);text-align:center;max-width:260px;">${esc(A.signinError)}</p>` : ''}
    </div>`;
}

/* ================================================================
   SCREEN: HOME
================================================================ */
function renderHome() {
  checkDueClaims();
  const hp = A.pendingClaims.length > 0;
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const showIOSBanner = isIOS() && !isStandalone && !sessionStorage.getItem('ios_banner_dismissed');
  const showNotifPrompt = !isAPK() && !isIOS() && 'Notification' in window 
    && Notification.permission === 'default' 
    && !sessionStorage.getItem('notif_prompt_dismissed');
  return `
    <div style="padding:14px 16px 8px;display:flex;align-items:center;gap:10px;">
      ${sheepSvg(48)}
      <div style="flex:1;text-align:center;">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--green-600);letter-spacing:0.01em;line-height:1;display:inline-block;transform:scaleY(1.1);transform-origin:center bottom;white-space:nowrap;">ewe-o-me</div>
      </div>
      <div style="font-size:10px;color:var(--text-2);line-height:1.5;text-align:right;flex-shrink:0;">Log it.<br>Track it.<br>Settle it.</div>
      <button onclick="go('settings')" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--text-2);flex-shrink:0;" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
    ${showNotifPrompt ? `
        <div style="font-size:18px;">&#128276;</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">Enable notifications</div>
          <div style="font-size:12px;color:var(--text-2);line-height:1.5;">Get notified when someone sends you a claim or responds to yours.</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">
          <button onclick="requestNotificationPermission('${A.user?.uid}');sessionStorage.setItem('notif_prompt_dismissed','1');render()" style="background:var(--green-600);color:white;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:500;padding:5px 10px;cursor:pointer;">Enable</button>
          <button onclick="sessionStorage.setItem('notif_prompt_dismissed','1');render()" style="background:none;border:none;font-size:11px;color:var(--text-3);cursor:pointer;padding:2px;">Not now</button>
        </div>
      </div>` : ''}
    ${showIOSBanner ? `
      <div style="margin:0 16px 4px;padding:11px 13px;background:#EEF5FF;border-radius:var(--radius-sm);border:0.5px solid #B8D4F0;display:flex;align-items:flex-start;gap:10px;">
        <div style="font-size:18px;">&#128241;</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">Tip: add to your home screen</div>
          <div style="font-size:12px;color:var(--text-2);line-height:1.5;">In Safari, tap &#11014; then <strong>Add to Home Screen</strong> for the best experience.</div>
        </div>
        <button onclick="sessionStorage.setItem('ios_banner_dismissed','1');render()" style="background:none;border:none;font-size:18px;color:var(--text-3);cursor:pointer;padding:0;">&#215;</button>
      </div>` : ''}
    ${(A.simplifications||[]).length > 0 ? `
      <div style="margin:0 16px 4px;padding:11px 13px;background:var(--green-50);border-radius:var(--radius-sm);border:0.5px solid var(--green-100);display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="openSimplification('${A.simplifications[0].id}')">
        <div style="font-size:18px;">&#9889;</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;color:var(--green-700);">A simpler way to settle up</div>
          <div style="font-size:12px;color:var(--green-600);line-height:1.5;">There's a suggested simplification involving you — tap to see it.</div>
        </div>
        <div style="color:var(--green-600);font-size:18px;">&#8250;</div>
      </div>` : ''}
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;flex:1;padding:clamp(12px,4vh,32px) 16px;gap:clamp(12px,4vh,32px);">
      <button class="circle-btn circle-green" onclick="startClaim('eweome')" style="width:min(62vw,min(38vh,210px));height:min(62vw,min(38vh,210px));">
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <span style="font-size:22px;font-weight:700;letter-spacing:1px;color:#27500A;line-height:1.15;">YOU</span>
          <span style="font-size:22px;font-weight:700;letter-spacing:1px;color:#27500A;line-height:1.15;">OWE</span>
          <span style="font-size:22px;font-weight:700;letter-spacing:1px;color:#27500A;line-height:1.15;">ME</span>
        </div>
      </button>
      <button class="circle-btn circle-amber" onclick="startClaim('ioowe')" style="width:min(62vw,min(38vh,210px));height:min(62vw,min(38vh,210px));">
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <span style="font-size:22px;font-weight:700;letter-spacing:1px;color:#412402;line-height:1.15;">I</span>
          <span style="font-size:22px;font-weight:700;letter-spacing:1px;color:#412402;line-height:1.15;">OWE</span>
          <span style="font-size:22px;font-weight:700;letter-spacing:1px;color:#412402;line-height:1.15;">YOU</span>
        </div>
      </button>
    </div>`;
}

function startClaim(type) {
  A.claim = { type, personId: null, personName: null, amount: '', date: today(), desc: '', onAccount: false, recurring: false, recurrence: { freq: 'monthly', day: 'Monday', dayOfMonth: 1 }, recipients: [] };
  A._whoSearch = '';
  A._newPersonPrefill = '';
  go(type === 'eweome' ? 'ew_who' : 'io_who');
}

/* ================================================================
   CLAIM FLOW HELPERS
================================================================ */
function dots(step, total) {
  return `<div class="step-dots" aria-label="Step ${step} of ${total}">
    ${Array.from({length: total}, (_, i) =>
      `<div class="sdot ${i < step-1 ? 'done' : i === step-1 ? 'active' : ''}"></div>`
    ).join('')}
  </div>`;
}

function hdr(title, back, step, total) {
  return `<div class="screen-header">
    <button class="back-btn" onclick="go('${back}')" aria-label="Back">&#8249;</button>
    <span class="screen-title">${title}</span>
    ${step ? dots(step, total) : ''}
  </div>`;
}

function pfx() { return A.claim.type === 'ioowe' ? 'io' : 'ew'; }

/* ================================================================
   SCREEN: WHO (step 1)
================================================================ */
function renderWho() {
  const io = A.claim.type === 'ioowe';
  const hasContactPicker = ('contacts' in navigator && 'ContactsManager' in window) || window.AndroidBridge?.pickContact;
  const q  = io ? 'Who do you owe?' : 'Who owes you?';
  const isMulti = A.claim.type === 'eweome';
  const selected = A.claim.recipients || [];
  const q_val = A._whoSearch || '';

  const allConns = [...A.connections]
    .filter(c => c.id !== A.user.uid && c.uid !== A.user.uid)
    .sort((a,b) => (a.name||'').localeCompare(b.name||''));

  // Match from start of name, OR anywhere in phone number
  const filtered = q_val
    ? allConns.filter(c =>
        (c.name||'').toLowerCase().startsWith(q_val.toLowerCase()) ||
        (c.phone||'').replace(/\s/g,'').includes(q_val.replace(/\s/g,''))
      )
    : [];

  const connRows = filtered.map(c => {
    const isSel = selected.some(r => r.id === c.id);
    const sub = [c.email, c.phone].filter(Boolean).join(' — ');
    return '<div class="list-item" onclick="toggleRecipient(\''+esc(c.id)+'\',\''+esc(c.name)+'\')" style="'+(isSel?'background:var(--green-50);':'')+'">'
      +'<div class="avatar '+(c.color||'')+'">'+initials(c.name)+'</div>'
      +'<div style="flex:1;min-width:0;">'
      +'<div style="font-size:15px;font-weight:500;">'+esc(c.name)+'</div>'
      +(sub?'<div style="font-size:12px;color:var(--text-2);">'+esc(sub)+'</div>':'')
      +'</div>'
      +'<div style="color:var(--text-3);font-size:20px;">'+(isMulti?(isSel?'&#10003;':'&#43;'):'&#8250;')+'</div>'
      +'</div>';
  }).join('');

  const exactMatch = filtered.some(c => (c.name||'').toLowerCase() === q_val.toLowerCase());
  const addNewRow = q_val && !exactMatch
    ? '<div class="list-item" onclick="goNewPersonWithName(\''+esc(q_val)+'\')">' 
      + '<div class="avatar" style="background:var(--surface);color:var(--text-2);font-size:20px;">+</div>'
      + '<div><div style="font-size:15px;font-weight:500;color:var(--green-600);">Add &ldquo;'+esc(q_val)+'&rdquo;</div>'
      + '<div style="font-size:12px;color:var(--text-2);">Find by phone/email or log against name</div></div></div>'
    : '';

  const multiBar = isMulti && selected.length > 0
    ? `<div style="padding:10px 16px;background:var(--green-50);display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);"><span style="font-size:13px;color:var(--green-600);font-weight:500;">${selected.length} selected: ${selected.map(r => esc(r.name)).join(', ')}</span><button class="btn btn-green" style="width:auto;padding:7px 14px;font-size:13px;" onclick="proceedMulti()">Continue &rarr;</button></div>`
    : '';

  const addNewBtn = '<div class="list-item" onclick="go(\'new_person_claim\')">' 
    + '<div class="avatar" style="background:var(--surface);color:var(--text-2);font-size:20px;">+</div>'
    + '<div><div style="font-size:15px;font-weight:500;color:var(--green-600);">Add someone new</div>'
    + '<div style="font-size:12px;color:var(--text-2);">Find by phone/email or log against name</div></div></div>';
  const hintText = hasContactPicker
    ? 'Pick from contacts or type a name to search.'
    : isIOS()
    ? 'Type a name to search. To add someone not listed, tap &ldquo;Add someone new&rdquo; below.'
    : 'Type a name to search, or use &ldquo;Add someone new&rdquo; below.';
  const emptyHint = !q_val
    ? '<div style="padding:4px 16px 6px;font-size:12px;color:var(--text-3);">' + hintText + '</div>' + addNewBtn
    : '';

  return `
    ${hdr(q, 'home', 1, 4)}
    ${multiBar}
    <div style="padding:12px 16px 8px;">
      <input type="text" class="input" id="who-search"
        placeholder="Start typing a name…"
        value="${esc(q_val)}"
        oninput="A._whoSearch=this.value;render()"
        autocomplete="off" autocorrect="off" autocapitalize="words"
        style="margin:0;"/>
    </div>
    <div id="who-results">${connRows}${addNewRow}${emptyHint}</div>`;
}

function goNewPersonWithName(name) {
  A._whoSearch = '';
  A._newPersonPrefill = name;
  go('new_person_claim');
}

function toggleRecipient(id, name) {
  if (A.claim.type === 'ioowe') { selectPerson(id, name); return; }
  if (!A.claim.recipients) A.claim.recipients = [];
  const idx = A.claim.recipients.findIndex(r => r.id === id);
  if (idx >= 0) { A.claim.recipients.splice(idx, 1); } else { A.claim.recipients.push({id, name}); }
  render();
}

function proceedMulti() {
  if (!A.claim.recipients || A.claim.recipients.length === 0) return;
  A.claim.personId   = A.claim.recipients[0].id;
  A.claim.personName = A.claim.recipients[0].name;
  go('ew_amt');
}

function selectPerson(id, name) {
  if (id === A.user.uid) {
    showToast("You can't send a claim to yourself.");
    return;
  }
  A.claim.personId   = id;
  A.claim.personName = name;
  go(pfx() + '_amt');
}

/* ================================================================
   SCREEN: AMOUNT (step 2)
================================================================ */
function renderAmount() {
  const io  = A.claim.type === 'ioowe';
  const lbl = io
    ? `How much do you owe ${esc(A.claim.personName)}?`
    : `How much does ${esc(A.claim.personName)} owe you?`;

  return `
    ${hdr(lbl, pfx()+'_who', 2, 4)}
    <div class="amount-wrap">
      <span class="amount-symbol">&pound;</span>
      <input
        type="number"
        id="amt-in"
        class="amount-input"
        placeholder="0.00"
        step="0.01"
        inputmode="decimal"
        value="${esc(A.claim.amount)}"
        oninput="A.claim.amount=this.value"
        aria-label="Amount in pounds"
      />
    </div>
    <div style="padding:0 16px;">
      <button class="btn btn-green" onclick="fromAmount()">Next &rarr;</button>
    </div>`;
}

function fromAmount() {
  const el = document.getElementById('amt-in');
  if (el) A.claim.amount = el.value;
  if (!A.claim.amount || parseFloat(A.claim.amount) <= 0) {
    if (el) el.style.borderBottomColor = '#E24B4A';
    return;
  }
  go(pfx() + '_date');
}

/* ================================================================
   SCREEN: DATE (step 3)
================================================================ */
function renderDate() {
  return `
    ${hdr('When did this happen?', pfx()+'_amt', 3, 4)}
    <div style="padding:20px 16px;">
      <input
        type="date"
        id="date-in"
        class="input"
        value="${A.claim.date}"
        max="${today()}"
        oninput="A.claim.date=this.value"
        style="margin-bottom:12px;"
        aria-label="Date"
      />
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" style="font-size:12px;padding:9px;" onclick="setDate(0)">Today</button>
        <button class="btn btn-ghost" style="font-size:12px;padding:9px;" onclick="setDate(1)">Yesterday</button>
      </div>
    </div>
    <div style="padding:0 16px;">
      <button class="btn btn-green" onclick="fromDate()">Next &rarr;</button>
    </div>`;
}

function setDate(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  A.claim.date = d.toISOString().split('T')[0];
  const el = document.getElementById('date-in');
  if (el) el.value = A.claim.date;
}

function fromDate() {
  const el = document.getElementById('date-in');
  if (el) A.claim.date = el.value;
  go(pfx() + '_desc');
}

/* ================================================================
   SCREEN: DESCRIPTION (step 4)
================================================================ */
function renderDesc() {
  return `
    ${hdr("What's it for?", pfx()+'_date', 4, 4)}
    <div style="padding:20px 16px;">
      <textarea
        id="desc-in"
        class="input"
        style="height:80px;"
        placeholder="Brief description, e.g. dinner out, taxi, petrol…"
        oninput="A.claim.desc=this.value"
        aria-label="Description"
      >${esc(A.claim.desc)}</textarea>
    </div>
    <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px;background:var(--surface);border-radius:var(--radius-sm);border:0.5px solid var(--border);">
        <input type="checkbox" id="on-acct" style="width:18px;height:18px;accent-color:#3B6D11;" ${A.claim.onAccount?"checked":""} onchange="A.claim.onAccount=this.checked"/>
        <div>
          <div style="font-size:14px;font-weight:500;">Keep on account</div>
          <div style="font-size:12px;color:var(--text-2);margin-top:2px;">No rush to pay — this can sit until convenient</div>
        </div>
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px;background:var(--surface);border-radius:var(--radius-sm);border:0.5px solid var(--border);">
        <input type="checkbox" id="recurring" style="width:18px;height:18px;accent-color:#3B6D11;" ${A.claim.recurring?"checked":""} onchange="A.claim.recurring=this.checked;if(this.checked){if(!A.claim.recurrence||!A.claim.recurrence.freq)A.claim.recurrence={freq:'monthly',day:'Monday',dayOfMonth:1};}else{A.claim.recurrence={freq:'monthly',day:'Monday',dayOfMonth:1};}render()"/>
        <div>
          <div style="font-size:14px;font-weight:500;">Recurring request</div>
          <div style="font-size:12px;color:var(--text-2);margin-top:2px;">Prompt me to re-send this on a schedule</div>
        </div>
      </label>
      ${A.claim.recurring === true ? `
        <div style="padding:12px;background:var(--surface);border-radius:var(--radius-sm);border:0.5px solid var(--border);display:flex;flex-direction:column;gap:10px;">
          <div>
            <label class="field-label">Frequency</label>
            <select id="rec-freq" class="input" onchange="A.claim.recurrence.freq=this.value;render()">
              <option value="weekly"     ${A.claim.recurrence.freq==='weekly'     ?'selected':''}>Weekly</option>
              <option value="fortnightly"${A.claim.recurrence.freq==='fortnightly'?'selected':''}>Fortnightly</option>
              <option value="monthly"    ${A.claim.recurrence.freq==='monthly'    ?'selected':''}>Monthly</option>
            </select>
          </div>
          ${A.claim.recurrence.freq === 'monthly' ? `
            <div>
              <label class="field-label">Day of month</label>
              <select id="rec-dom" class="input" onchange="A.claim.recurrence.dayOfMonth=parseInt(this.value)">
                ${Array.from({length:28},(_,i)=>'<option value="'+(i+1)+'" '+(A.claim.recurrence.dayOfMonth===i+1?'selected':'')+'>'+(i+1)+'</option>').join('')}
              </select>
            </div>` : `
            <div>
              <label class="field-label">Day of week</label>
              <select id="rec-day" class="input" onchange="A.claim.recurrence.day=this.value">
                ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d=>'<option value="'+d+'" '+(A.claim.recurrence.day===d?'selected':'')+'>'+d+'</option>').join('')}
              </select>
            </div>`}
        </div>` : ""}
    </div>
    <div style="padding:0 16px;">
      <button class="btn btn-green" onclick="fromDesc()">Review claim &rarr;</button>
    </div>`;
}

function fromDesc() {
  const el = document.getElementById('desc-in');
  if (el) A.claim.desc = el.value;
  go(pfx() + '_conf');
}

/* ================================================================
   SCREEN: CONFIRM
================================================================ */
function renderConfirm() {
  const io      = A.claim.type === 'ioowe';
  const amtCol  = io ? 'var(--red-600)' : 'var(--green-600)';
  const whoLbl  = io ? 'Who you owe' : 'Who owes you';
  const msg     = io
    ? `You're telling ${esc(A.claim.personName)} you owe them ${fmt(A.claim.amount)}.`
    : `You're telling ${esc(A.claim.personName)} they owe you ${fmt(A.claim.amount)}.`;

  return `
    <div class="screen-header">
      <button class="back-btn" onclick="go('${pfx()}_desc')" aria-label="Back">&#8249;</button>
      <span class="screen-title">Confirm &amp; send</span>
    </div>
    <div style="padding:16px;">
      <div class="card" style="margin-bottom:16px;">
        <div class="card-row">
          <span class="card-key">${whoLbl}</span>
          <span class="card-val">${esc(A.claim.personName)}</span>
        </div>
        <div class="card-row">
          <span class="card-key">Amount</span>
          <span class="card-val" style="color:${amtCol};font-size:20px;">${fmt(A.claim.amount)}</span>
        </div>
        <div class="card-row">
          <span class="card-key">Date</span>
          <span class="card-val">${fmtDate(A.claim.date)}</span>
        </div>
        <div class="card-row">
          <span class="card-key">Description</span>
          <span class="card-val">${esc(A.claim.desc) || '<span style="color:var(--text-3);">None</span>'}</span>
        </div>
        ${A.claim.onAccount ? `<div class="card-row" style="border-bottom:none;"><span class="card-key">Payment</span><span class="card-val" style="color:var(--text-2);font-size:13px;">On account — no rush</span></div>` : ""}
      </div>
      <p style="font-size:12px;color:var(--text-2);text-align:center;line-height:1.7;margin-bottom:16px;">
        ${msg}<br>
        They'll be notified and can accept, query, or reject.
      </p>
      <button class="btn btn-green" style="padding:14px;" onclick="sendClaim()">Send claim</button>
    </div>`;
}

async function sendMultiClaim() {
  const batch = db.batch();
  const credUid  = A.user.uid;
  const credName = A.userDoc?.displayName || A.user.displayName;
  for (const r of A.claim.recipients) {
    const ref = db.collection('claims').doc();
    batch.set(ref, {
      creditorUid: credUid, creditorName: credName,
      debtorUid: r.id, debtorName: r.name,
      amount: parseFloat(A.claim.amount), currency: 'GBP',
      onAccount: A.claim.onAccount || false,
      recurring: A.claim.recurring || false,
      recurrence: A.claim.recurring ? A.claim.recurrence : null,
      description: A.claim.desc, date: A.claim.date,
      type: 'eweome', status: 'pending',
      counterAmount: null, counterComment: null,
      participants: [credUid, r.id],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  try {
    await batch.commit();
    // Notify each registered recipient
    const notifTitle = (A.userDoc?.displayName||'Someone') + ' has sent you a request';
    const notifBody = fmt(parseFloat(A.claim.amount)) + (A.claim.desc ? ' for ' + A.claim.desc : '');
    for (const r of A.claim.recipients) {
      if (r.id && !r.id.startsWith('pending_')) {
        sendPushNotification(r.id, notifTitle, notifBody);
      }
    }
    go('ew_sent');
  } catch(e) { showToast('Something went wrong. Please try again.'); }
}

async function sendClaim() {
  if (A.claim.type === 'eweome' && A.claim.recipients && A.claim.recipients.length > 1) {
    await sendMultiClaim(); return;
  }
  const claimDateMs = new Date(A.claim.date).getTime();
  const threeDays = 3 * 24 * 60 * 60 * 1000;
  const allClaims = [...A.pendingClaims, ...A.sentClaims, ...A.ledger, ...A.settled];
  const io_dup = A.claim.type === 'ioowe';
  const dup = allClaims.find(c =>
    // For YOM: we are creditor. For IOU: we are debtor
    (io_dup ? c.debtorUid === A.user.uid && c.creditorUid === A.claim.personId
            : c.creditorUid === A.user.uid && c.debtorUid === A.claim.personId) &&
    parseFloat(c.amount) === parseFloat(A.claim.amount) &&
    Math.abs(new Date(c.date||'').getTime() - claimDateMs) <= threeDays
  );
  if (dup) {
    await new Promise(resolve => {
      showModal(
        'Heads up — you already sent ' + esc(A.claim.personName) + ' a claim for ' + fmt(A.claim.amount) +
        ' on ' + fmtDate(dup.date) + '. The amounts match — is this a duplicate?',
        [
          { label: 'Send anyway', style: 'btn-green', action: () => resolve(true) },
          { label: 'Go back', style: 'btn-ghost', action: () => resolve(false) }
        ]
      );
    }).then(ok => { if (!ok) throw new Error('CANCELLED'); });
  }
  const io       = A.claim.type === 'ioowe';
  const credUid  = io ? A.claim.personId           : A.user.uid;
  const credName = io ? A.claim.personName          : (A.userDoc?.displayName || A.user.displayName);
  const debtUid  = io ? A.user.uid                 : A.claim.personId;
  const debtName = io ? (A.userDoc?.displayName || A.user.displayName) : A.claim.personName;

  try {
    const docRef = await db.collection('claims').add({
      creditorUid:  credUid,
      creditorName: credName,
      debtorUid:    debtUid,
      debtorName:   debtName,
      amount:       parseFloat(A.claim.amount),
      currency:     'GBP',
      onAccount:    A.claim.onAccount || false,
      recurring:    A.claim.recurring || false,
      recurrence:   A.claim.recurring ? A.claim.recurrence : null,
      description:  A.claim.desc,
      date:         A.claim.date,
      type:         A.claim.type,
      status:       io ? 'agreed' : 'pending',
      counterAmount:   null,
      counterComment:  null,
      participants:    (A.claim.pendingPhone || A.claim.pendingEmail || A.claim.isNameOnly) ? [credUid] : [credUid, debtUid],
      pendingPhone:    A.claim.pendingPhone || null,
      pendingEmail:    A.claim.pendingEmail || null,
      isNameOnly:      A.claim.isNameOnly || false,
      nextDue: A.claim.recurring ? nextDueDate(A.claim.recurrence, A.claim.date) : null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    A._lastSentId = docRef ? docRef.id : null;
    if (!A.claim.pendingPhone) {
      const notifTitle = io ? (A.userDoc?.displayName||'Someone') + ' has logged an I Owe You' : (A.userDoc?.displayName||'Someone') + ' has sent you a request';
      const notifBody  = fmt(parseFloat(A.claim.amount)) + (A.claim.desc ? ' for ' + A.claim.desc : '');
      const notifTarget = io ? credUid : debtUid;
      sendPushNotification(notifTarget, notifTitle, notifBody);
    }
    go(pfx() + '_sent');
  } catch (e) {
    if (e.message !== 'CANCELLED') {
      console.error('sendClaim error:', e.code, e.message);
      showToast('Could not send claim: ' + (e.code || e.message || 'unknown error'));
    }
  }
}

function goNextPending() {
  const next = A.pendingClaims.find(c => c.id !== A.selectedClaimId);
  if (next) {
    A.selectedClaimId = next.id;
    go('req_detail');
  } else {
    go('home');
  }
}

async function acceptClaim(id) {
  const cl = [...A.pendingClaims,...A.sentClaims,...A.ledger].find(c=>c.id===id);
  // Guard: only the right party can accept
  if (cl) {
    const isIOU = cl.type === 'ioowe';
    const shouldBeDebtor = !isIOU; // YOM: debtor accepts; IOU: creditor accepts
    const callerIsDebtor = cl.debtorUid === A.user?.uid;
    const callerIsCreditor = cl.creditorUid === A.user?.uid;
    if (shouldBeDebtor && !callerIsDebtor && !callerIsCreditor) {
      console.warn('acceptClaim: wrong role'); return;
    }
  }
  try {
    await db.collection('claims').doc(id).update({
      status:    'agreed',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    if (cl) sendPushNotification(cl.creditorUid, (A.userDoc?.displayName||'Someone') + ' accepted your request', fmt(cl.amount) + (cl.description?' for '+cl.description:''));
    goNextPending();
  } catch(e) { showToast('Something went wrong. Please try again.'); }
}

async function acceptCounter(id, counterAmount) {
  const cl = [...A.pendingClaims,...A.sentClaims,...A.ledger].find(c=>c.id===id);
  try {
    await db.collection('claims').doc(id).update({
      status:    'agreed',
      amount:    parseFloat(counterAmount),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    if (cl) sendPushNotification(cl.creditorUid, (A.userDoc?.displayName||'Someone') + ' accepted your counter-offer', fmt(counterAmount) + (cl.description?' for '+cl.description:''));
    goNextPending();
  } catch(e) { showToast('Something went wrong. Please try again.'); }
}

async function rejectClaim(id) {
  const rClaim = [...A.pendingClaims,...A.sentClaims,...A.ledger].find(c=>c.id===id);
  try {
    await db.collection('claims').doc(id).update({
      status:    'rejected',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    if (rClaim) sendPushNotification(rClaim.creditorUid, (A.userDoc?.displayName||'Someone') + ' rejected your claim', fmt(rClaim.amount) + (rClaim.description?' for '+rClaim.description:''));
    goNextPending();
  } catch(e) { showToast('Something went wrong. Please try again.'); }
}

      status: 'rejected',

function goNextPending() {
  const next=A.pendingClaims.find(c=>c.id!==A.selectedClaimId);
  if(next){A.selectedClaimId=next.id;go('req_detail');}else go('home');
}

function sendRevisedClaim(claimId) {
  const all = [...A.pendingClaims,...A.sentClaims,...A.ledger,...(A.settled||[])];
  const claim = all.find(c => c.id === claimId) || 
    A.pendingClaims.find(c => c.id === claimId);
  if (!claim) return;
  // Pre-fill a new claim with the rejected claim's details
  A.claim = {
    type:        'eweome',
    personId:    claim.debtorUid,
    personName:  claim.debtorName,
    amount:      claim.amount ? String(claim.amount) : '',
    desc:        claim.description || '',
    date:        claim.date || today(),
    note:        claim.rejectionNote ? 'Re-sent after rejection: \"' + claim.rejectionNote + '\"' : 'Re-sent after rejection',
    recipients:  null,
    pendingPhone: null
  };
  // Dismiss the rejected claim first
  dismissRejected(claimId);
  // Go straight to amount step so they can revise the amount before sending
  go('ew_amt');
}

function sharePaymentLink(claimId) {

  const link = A.userDoc?.paymentLink || '';

    (claim.description ? ' for ' + claim.description : '') + ' now.\n\n' + link;

    navigator.share({ text }).catch(() => {});
  } else {
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  }
}

async function showPayNow(claimId) {
  const all = [...A.pendingClaims,...A.sentClaims,...A.ledger,...(A.settled||[])];
  const claim = all.find(c => c.id === claimId);
  if (!claim) return;
  const creditorUid = claim.creditorUid;
  let bankDetails = null;
  try {
    const snap = await db.collection('bank_details').doc(creditorUid).get();
    if (snap.exists) bankDetails = snap.data();
  } catch(e) {}

  const remaining = remainingAmount(claim);
  const amountStr = remaining.toFixed(2);
  const ref = (bankDetails?.reference || claim.description || A.userDoc?.displayName || 'payment').substring(0, 18);

  // Attempt payto:// deep link (RFC 8905 — supported by some UK banking apps)
  if (bankDetails) {
    const sortRaw = (bankDetails.sortCode || '').replace(/[^0-9]/g, '');
    const accRaw  = (bankDetails.accountNumber || '').replace(/[^0-9]/g, '');
    if (sortRaw.length === 6 && accRaw.length === 8) {
      const paytoUrl = `payto://sort-bic/${sortRaw.slice(0,2)}-${sortRaw.slice(2,4)}-${sortRaw.slice(4,6)}/${accRaw}?amount=GBP:${amountStr}&message=${encodeURIComponent(ref)}`;
      // Try to open the payto URI; if the browser/OS handles it, great
      // We detect failure by checking if we're still in the foreground after a short delay
      let appOpened = false;
      window.addEventListener('blur', () => { appOpened = true; }, { once: true });
      window.location.href = paytoUrl;
      await new Promise(r => setTimeout(r, 800));
      if (appOpened) return; // Banking app opened — done
    }
  }

  // Fallback: show the bank details modal (same as before, just renamed button)
  if (!bankDetails) {
    showModal(
      esc(claim.creditorName) + ' hasn\'t added bank details yet. Ask them to add their details in Settings.',
      [{ label: 'OK', style: 'btn-ghost', action: () => {} }]
    );
    return;
  }
  const amount = fmt(remaining);
  const details = `Account name: ${bankDetails.name}\nSort code: ${bankDetails.sortCode}\nAccount number: ${bankDetails.accountNumber}\nReference: ${ref}\nAmount: ${amount}`;
  showModal(
    `<div style="text-align:left;">
      <div style="font-size:13px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">${esc(claim.creditorName)}'s bank details</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div><div style="font-size:11px;color:var(--text-3);">Account name</div><div style="font-size:15px;font-weight:500;">${esc(bankDetails.name)}</div></div>
        <div><div style="font-size:11px;color:var(--text-3);">Sort code</div><div style="font-size:15px;font-weight:500;">${esc(bankDetails.sortCode)}</div></div>
        <div><div style="font-size:11px;color:var(--text-3);">Account number</div><div style="font-size:15px;font-weight:500;">${esc(bankDetails.accountNumber)}</div></div>
        ${bankDetails.reference ? `<div><div style="font-size:11px;color:var(--text-3);">Reference</div><div style="font-size:15px;font-weight:500;">${esc(bankDetails.reference)}</div></div>` : ''}
        <div style="margin-top:4px;padding:10px;background:var(--green-50);border-radius:var(--radius-sm);border:0.5px solid var(--green-100);"><div style="font-size:11px;color:var(--text-3);">Amount to pay</div><div style="font-size:18px;font-weight:500;color:var(--green-700);">${amount}</div></div>
      </div>
    </div>`,
    [
      { label: 'Copy details', style: 'btn-green', action: () => {
        copyToClipboard(details);
      }},
      { label: 'Done', style: 'btn-ghost', action: () => {} }
    ]
  );
}

        <div style="font-size:22px;font-weight:600;color:var(--text-1);">${fmt(claim.amount)}</div>

        ${claim.description ? `<div style="font-size:13px;color:var(--text-2);margin-top:4px;">${esc(claim.description)}</div>` : ''}
      </div>
      <div>
        <label class="field-label">How much are you paying now?</label>
        <div style="position:relative;">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-2);">£</span>
          <input id="partial-amt" type="number" min="0.01" step="0.01" max="${remaining.toFixed(2)}"
            style="padding:13px 14px 13px 28px;font-size:17px;width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);box-sizing:border-box;"
            placeholder="0.00" value="${A._partialAmount || ''}"
            oninput="A._partialAmount=this.value"
            inputmode="decimal" />
        </div>
        <div style="font-size:12px;color:var(--text-2);margin-top:6px;">Must be between £0.01 and ${fmt(remaining)}.</div>
      </div>
      <button class="btn btn-green" style="padding:14px;" onclick="submitPartialPayment('${claim.id}')">Log this payment</button>
      <button class="btn btn-ghost" style="padding:11px;font-size:13px;" onclick="go('req_detail')">Cancel</button>
    </div>`;
}

async function submitPartialPayment(claimId) {
  const claim = [...A.ledger, ...A.pendingClaims].find(c => c.id === claimId);
  if (!claim) return;
  const remaining = remainingAmount(claim);
  const amt = parseFloat(A._partialAmount);
  if (!amt || isNaN(amt) || amt <= 0) { showToast('Please enter a valid amount.'); return; }
  if (amt > remaining + 0.001) { showToast('Amount exceeds the remaining balance of ' + fmt(remaining) + '.'); return; }
  // If paying the full remaining amount, just use the normal markSettled flow
  if (Math.abs(amt - remaining) < 0.01) {
    A._partialAmount = '';
    go('req_detail');
    await markSettled(claimId);
    return;
  }
  try {
    await db.collection('claims').doc(claimId).update({
      pendingPartialAmount: amt,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    sendPushNotification(claim.creditorUid, A.userDoc?.displayName || 'Someone',
      'says they\'ve paid ' + fmt(amt) + ' towards the ' + fmt(claim.amount) + ' claim');
    A._partialAmount = '';
    showToast('Logged! Waiting for ' + (claim.creditorName || 'them') + ' to confirm.');
    go('home');
  } catch(e) { showToast('Something went wrong. Please try again.'); }
}

async function confirmPartialPayment(claimId) {
  const claim = [...A.ledger, ...A.pendingClaims].find(c => c.id === claimId);
  if (!claim) return;
  const partial = claim.pendingPartialAmount || 0;
  const newAmountPaid = (claim.amountPaid || 0) + partial;
  const fullyPaid = newAmountPaid >= claim.amount - 0.01;
  try {
    if (fullyPaid) {
      await db.collection('claims').doc(claimId).update({
        status: 'settled',
        amountPaid: newAmountPaid,
        pendingPartialAmount: 0,
        settledAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast('Fully settled — nice one!');
    } else {
      await db.collection('claims').doc(claimId).update({
        amountPaid: newAmountPaid,
        pendingPartialAmount: 0,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast(fmt(partial) + ' confirmed. ' + fmt(claim.amount - newAmountPaid) + ' still outstanding.');
    }
    sendPushNotification(claim.debtorUid, A.userDoc?.displayName || 'Someone',

async function sendQuestion() {

async function sendQuery() {
  const amount = A.queryAmount || document.getElementById('q-amount')?.value;
  const note   = A.queryNote   || document.getElementById('q-note')?.value   || '';

  if (!amount || parseFloat(amount) <= 0) {
    const el = document.getElementById('q-amount');
    if (el) el.style.borderColor = '#E24B4A';
    return;
  }

  try {
    await db.collection('claims').doc(A.selectedClaimId).update({
      status:         'queried',
      counterAmount:  parseFloat(amount),
      counterComment: note || null,
      question:       null,
      answeredQuestion: null,
      updatedAt:      firebase.firestore.FieldValue.serverTimestamp()
    });
    const qClaim = [...A.pendingClaims,...A.sentClaims,...A.ledger].find(c=>c.id===A.selectedClaimId);

}

function renderPosition() {
  // Build balance map directly from ledger - works even without connections
  const bals = {};
  A.ledger.forEach(claim => {
    if (claim.creditorUid === A.user.uid) {
      const id = claim.debtorUid;
      if (!bals[id]) bals[id] = { name: claim.debtorName, bal: 0, hasPendingSettlement: false };
      bals[id].bal += remainingAmount(claim);
      if (claim.status === 'settlement_pending') bals[id].hasPendingSettlement = true;
    } else if (claim.debtorUid === A.user.uid) {
      const id = claim.creditorUid;
      if (!bals[id]) bals[id] = { name: claim.creditorName, bal: 0, hasPendingSettlement: false };
      bals[id].bal -= remainingAmount(claim);
      if (claim.status === 'settlement_pending') bals[id].hasPendingSettlement = true;
    }
  });
  A.connections.forEach(c => { if (bals[c.id]) bals[c.id].color = c.color; });

  const items  = Object.entries(bals).filter(([,v]) => Math.abs(v.bal) >= 0.01).map(([id,v]) => ({id,...v}));
  const owed   = items.filter(i => i.bal > 0).reduce((s, i) => s + i.bal, 0);
  const owing  = items.filter(i => i.bal < 0).reduce((s, i) => s + Math.abs(i.bal), 0);

  return `

          <div class="balance-amount">${fmt(owed)}</div>
        </div>
        <div class="balance-card red">
          <div class="balance-label">You owe</div>
          <div class="balance-amount">${fmt(owing)}</div>
        </div>
      </div>
    </div>

    ${items.length === 0
      ? `<div class="empty" style="padding:32px 28px;">All square &mdash; no outstanding debts.</div>`

              ${fmt(Math.abs(i.bal))}
            </div>
            <div style="color:var(--text-3);font-size:20px;margin-left:6px;">&#8250;</div>
          </div>`).join('')
    }

/* ================================================================
   RECURRING CLAIMS
================================================================ */
function nextDueDate(recurrence, fromDate) {
  if (!recurrence) recurrence = { freq: 'monthly', dayOfMonth: 1 };
  const d = fromDate ? new Date(fromDate) : new Date();
  if (recurrence.freq === 'weekly' || recurrence.freq === 'fortnightly') {
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const targetDay = days.indexOf(recurrence.day || 'Monday');
    const step = recurrence.freq === 'fortnightly' ? 14 : 7;
    const next = new Date(d);
    next.setDate(next.getDate() + step);
    const diff = (targetDay - next.getDay() + 7) % 7;
    next.setDate(next.getDate() + diff);
    return next.toISOString().split('T')[0];
  } else {
    const next = new Date(d);
    next.setMonth(next.getMonth() + 1);
    next.setDate(Math.min(recurrence.dayOfMonth, 28));
    return next.toISOString().split('T')[0];
  }
}

function checkDueClaims() {
  const todayStr = today();
  const all = [...A.ledger, ...A.settled];
  A.dueClaims = all.filter(c =>
    c.recurring && c.recurrence &&
    c.creditorUid === A.user.uid &&
    c.nextDue && c.nextDue <= todayStr &&
    !c.dueDismissed
  );
}

  checkDueClaims();
  const due = A.dueClaims;
  return `

        These recurring requests are due. Tap to send each one — or dismiss if not needed this time.

      ${due.map(c => `

async function sendRecurring(originalId) {
  const c = A.dueClaims.find(x => x.id === originalId);
  if (!c) return;
  try {
    const nextDue = nextDueDate(c.recurrence, c.nextDue);
    const batch = db.batch();
    const newRef = db.collection('claims').doc();
    batch.set(newRef, {
      creditorUid: c.creditorUid, creditorName: c.creditorName,
      debtorUid: c.debtorUid, debtorName: c.debtorName,
      amount: c.amount, currency: 'GBP',
      onAccount: c.onAccount || false,
      recurring: true, recurrence: c.recurrence,
      nextDue,
      description: c.description, date: today(),
      type: c.type, status: 'pending',
      counterAmount: null, counterComment: null,
      participants: [c.creditorUid, c.debtorUid],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    batch.update(db.collection('claims').doc(originalId), {
      dueDismissed: true, nextDue,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await batch.commit();
    checkDueClaims();
    if (A.dueClaims.length > 0) render();
    else go('home');
  } catch(e) { showToast('Something went wrong. Please try again.'); }
}

async function dismissDue(originalId) {
  const c = A.dueClaims.find(x => x.id === originalId);
  if (!c) return;
  try {
    const nextDue = nextDueDate(c.recurrence, c.nextDue);
    await db.collection('claims').doc(originalId).update({
      dueDismissed: true, nextDue,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    checkDueClaims();
    if (A.dueClaims.length > 0) render();
    else go('home');
  } catch(e) { showToast('Something went wrong. Please try again.'); }
}

/* ================================================================
   DEBT NETTING ALGORITHM + SCREEN
================================================================ */
function computeSimplified() {
  const net = {};
  const addNet = (uid, name, amount) => {
    if (!net[uid]) net[uid] = { name, bal: 0 };
    net[uid].bal += amount;
  };
  A.ledger.forEach(c => {
    addNet(c.creditorUid, c.creditorName,  c.amount);
    addNet(c.debtorUid,   c.debtorName,   -c.amount);
  });
  const creditors = Object.entries(net).filter(([,v]) => v.bal >  0.005).map(([id,v]) => ({id, name:v.name, bal:v.bal}));
  const debtors   = Object.entries(net).filter(([,v]) => v.bal < -0.005).map(([id,v]) => ({id, name:v.name, bal:-v.bal}));
  creditors.sort((a,b) => b.bal - a.bal);
  debtors.sort((a,b)   => b.bal - a.bal);
  const payments = [];
  let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const cr = creditors[ci], dr = debtors[di];
    const amount = Math.min(cr.bal, dr.bal);
    if (amount > 0.005) payments.push({ from: dr.name, fromUid: dr.id, to: cr.name, toUid: cr.id, amount });
    cr.bal -= amount; dr.bal -= amount;
    if (cr.bal < 0.005) ci++;
    if (dr.bal < 0.005) di++;
  }
  return payments;
}

function renderSimplify() {
  const payments = computeSimplified();
  const myUid = A.user.uid;
  return `
    <div class="screen-header">

function buildLoopDiagram(debts, nameMap, myUid, isSimplified) {
  if (!debts || debts.length === 0) {
    return '<div style="text-align:center;padding:20px;font-size:13px;color:var(--text-3);">No payments needed.</div>';
  }
  // Build a simple horizontal/arc diagram in SVG
  const people = [...new Set(debts.flatMap(d => [d.from, d.to]))];
  const n = people.length;
  const W = 320, H = n <= 3 ? 120 : 160;
  const cx = W / 2, cy = H / 2;
  const r = Math.min(cx, cy) - 36;

  // Position nodes in a circle
  const pos = {};
  people.forEach((p, i) => {
    const angle = (2 * Math.PI * i / n) - Math.PI / 2;
    pos[p] = { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  });

  const nodeR = 22;
  const arrowColor = isSimplified ? '#3b6d11' : '#888';
  const lineColor  = isSimplified ? '#88b85c' : '#ccc';

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;display:block;margin:0 auto;">`;
  svg += `<defs><marker id="arr${isSimplified ? 'S' : 'B'}" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="${arrowColor}"/></marker></defs>`;

  // Draw edges
  debts.forEach(d => {
    const from = pos[d.from], to = pos[d.to];
    if (!from || !to) return;
    // Shorten line to not overlap nodes
    const dx = to.x - from.x, dy = to.y - from.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const sx = from.x + dx/dist * nodeR;
    const sy = from.y + dy/dist * nodeR;
    const ex = to.x   - dx/dist * (nodeR + 8);
    const ey = to.y   - dy/dist * (nodeR + 8);
    // Mid-point label
    const mx = (sx + ex) / 2, my = (sy + ey) / 2;
    svg += `<line x1="${sx.toFixed(1)}" y1="${sy.toFixed(1)}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="${lineColor}" stroke-width="1.5" marker-end="url(#arr${isSimplified ? 'S' : 'B'})"/>`;
    svg += `<rect x="${(mx-18).toFixed(1)}" y="${(my-9).toFixed(1)}" width="36" height="16" rx="4" fill="white" opacity="0.9"/>`;
    svg += `<text x="${mx.toFixed(1)}" y="${(my+4).toFixed(1)}" text-anchor="middle" font-size="9" fill="${arrowColor}" font-family="sans-serif">${esc(fmt(d.amount))}</text>`;
  });

  // Draw nodes
  people.forEach(p => {
    const {x, y} = pos[p];
    const isMe = p === myUid;
    const fillCol = isMe ? (isSimplified ? '#3b6d11' : '#5a8a2a') : 'white';
    const strokeCol = isMe ? (isSimplified ? '#3b6d11' : '#5a8a2a') : '#ccc';
    const textCol = isMe ? 'white' : '#444';
    const label = (nameMap[p] || 'Unknown').split(' ')[0]; // first name only
    svg += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${nodeR}" fill="${fillCol}" stroke="${strokeCol}" stroke-width="1.5"/>`;
    svg += `<text x="${x.toFixed(1)}" y="${(y+4).toFixed(1)}" text-anchor="middle" font-size="10" fill="${textCol}" font-family="sans-serif" font-weight="${isMe ? '600' : '400'}">${esc(label.substring(0,6))}</text>`;
  });

  svg += '</svg>';
  return svg;
}

async function respondToSimplification(simplificationId, agreed) {
  const uid = A.user?.uid;
  if (!uid) return;
  const msg = agreed
    ? 'Are you happy to simplify these debts? The others will need to agree too.'
    : 'Are you sure? Nothing will change and the others will be told it didn\'t work out.';
  showModal(msg, [
    { label: agreed ? 'Yes, works for me' : 'Yes, no thanks', style: agreed ? 'btn-green' : 'btn-ghost', action: async () => {
      try {
        await db.collection('simplifications').doc(simplificationId).update({
          [`consents.${uid}`]: agreed,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        if (!agreed) {
          showToast('No worries — nothing has changed.');
          go('home');
        } else {
          showToast('Great! Waiting for the others to agree.');
          render();
        }
      } catch(e) { showToast('Something went wrong. Please try again.'); }
    }},
    { label: 'Cancel', style: 'btn-ghost', action: () => {} }
  ]);
}

function hasNewFeaturesToShow() {
  const lastSeen = localStorage.getItem('eweome_last_seen_version');
  if (!lastSeen) return false; // brand new user — they get the welcome screen instead
  if (lastSeen === APP_VERSION) return false;
  // Check if any version in WHATS_NEW is newer than lastSeen
  return versionsNewerThan(lastSeen).length > 0;
}

function versionsNewerThan(lastSeen) {
  // Version strings are like 'v1.8.1' — parse and compare numerically
  function vNum(v) {
    return (v || '').replace('v','').split('.').map(Number);
  }
  function isNewer(a, b) {
    const an = vNum(a), bn = vNum(b);
    for (let i = 0; i < 3; i++) {
      if ((an[i]||0) > (bn[i]||0)) return true;
      if ((an[i]||0) < (bn[i]||0)) return false;
    }
    return false;
  }
  return Object.keys(WHATS_NEW)
    .filter(v => isNewer(v, lastSeen))
    .sort((a, b) => isNewer(b, a) ? 1 : -1); // newest first
}

function renderWhatsNew() {
  const lastSeen = localStorage.getItem('eweome_last_seen_version') || '';

async function updateNote(id) {
  const title  = document.getElementById('edit-note-title')?.value.trim();
  const person = document.getElementById('edit-note-person')?.value.trim() || '';
  const amount = document.getElementById('edit-note-amount')?.value || '';
  const body   = document.getElementById('edit-note-body')?.value.trim() || '';
  const dir    = document.getElementById('edit-dir-owe')?.style.opacity === '1' ? 'owe' : 'owed';
  if (!title) { showToast('Please add a title for the note.'); return; }
  const updates = { title, person, amount: amount ? parseFloat(amount) : null, direction: dir, body, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  try {
    await db.collection('users').doc(A.user.uid).collection('notes').doc(id).update(updates);
    A.notes = (A.notes||[]).map(n => n.id === id ? {...n, ...updates} : n);
    go('pending');
  } catch(e) { showToast('Could not save changes. Please try again.'); }
}

async function saveNote() {
  const title  = document.getElementById('note-title')?.value.trim();
  const person = document.getElementById('note-person')?.value.trim() || '';
  const amount = document.getElementById('note-amount')?.value || '';
  const body   = document.getElementById('note-body')?.value.trim() || '';
  const dir    = document.getElementById('dir-owe')?.style.opacity === '1' ? 'owe' : 'owed';
  if (!title) { showToast('Please add a title for the note.'); return; }
  const note = { title, person, amount: amount ? parseFloat(amount) : null, direction: dir, body, date: today(), createdAt: firebase.firestore.FieldValue.serverTimestamp() };
  try {
    const ref = await db.collection('users').doc(A.user.uid).collection('notes').add(note);
    A.notes = [{ id: ref.id, ...note, createdAt: new Date().toISOString() }, ...(A.notes||[])];
    go('notes');
  } catch(e) { showToast('Could not save note. Please try again.'); }
}

async function deleteNote(id) {
  showModal('Delete this note? This cannot be undone.', [
    { label: 'Delete', style: 'btn-red', action: async () => {
      try {
        await db.collection('users').doc(A.user.uid).collection('notes').doc(id).delete();
        A.notes = (A.notes||[]).filter(n => n.id !== id);
        render();
      } catch(e) { showToast('Could not delete note.'); }

}

function convertNoteToClaimPrompt(id) {
  const note = (A.notes||[]).find(n => n.id === id);
  if (!note) return;
  // Pre-fill claim with note details and go to claim flow
  A.claim.type     = note.direction === 'owe' ? 'ioowe' : 'eweome';
  A.claim.desc     = note.title;
  A.claim.amount   = note.amount ? String(note.amount) : '';
  A.claim.date     = note.date || today();
  A.claim.personName = note.person || '';
  A.claim.personId = '';
  go(A.claim.type === 'ioowe' ? 'io_who' : 'ew_who');
}

async function proceedNewPerson() {
  const name    = document.getElementById('np-name')?.value.trim();
  const contact = document.getElementById('np-contact')?.value.trim();
  const statusEl = document.getElementById('np-status');
  if (!name) { showToast('Please enter their name.'); return; }
  if (!A.claim.type) A.claim.type = 'eweome';

  // If no contact info given, treat as name-only log
  if (!contact) {
    A.claim.personId     = null;
    A.claim.personName   = name;
    A.claim.pendingPhone = null;
    A.claim.pendingEmail = null;
    A.claim.isNameOnly   = true;
    go(A.claim.type === 'ioowe' ? 'io_amt' : 'ew_amt');
    return;
  }

  const isPhone = /^[+\d]/.test(contact);
  const lookupKey = isPhone ? normalisePhone(contact) : contact.toLowerCase();

  if (statusEl) statusEl.textContent = 'Checking...';
  try {
    // Check if registered
    let snap = isPhone
      ? await db.collection('users_by_phone').doc(lookupKey).get()
      : await db.collection('users_by_email').doc(lookupKey).get();

    if (snap.exists) {
      // Found — registered user
      const theirUid  = snap.data().uid;
      const theirName = snap.data().displayName || name;
      A.claim.personId     = theirUid;
      A.claim.personName   = theirName;
      A.claim.pendingPhone = null;
      A.claim.pendingEmail = null;
      A.claim.isNameOnly   = false;
      // Add to connections
      const conn = { id: theirUid, uid: theirUid, name: theirName,
        email: isPhone ? '' : lookupKey, phone: isPhone ? lookupKey : '',
        color: A.connections.length % 2 === 0 ? '' : 'amber', addedAt: new Date().toISOString() };
      const filtered = A.connections.filter(c => c.uid !== theirUid && c.id !== theirUid);
      const updatedConns = [...filtered, conn];
      await db.collection('users').doc(A.user.uid).update({ connections: updatedConns }).catch(()=>{});
      A.connections = updatedConns;
      // Show clear confirmation before proceeding
      if (statusEl) {
        statusEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--green-50);border-radius:var(--radius-sm);border:0.5px solid var(--green-100);margin-top:4px;">'
          + '<div style="font-size:18px;">&#10003;</div>'
          + '<div><div style="font-size:14px;font-weight:500;color:var(--green-700);">Found ' + esc(theirName) + ' on ewe-o-me</div>'
          + '<div style="font-size:12px;color:var(--green-600);">They\'ll be notified when you send the claim.</div></div></div>';
      }
      // Auto-proceed after brief pause so user sees the confirmation
      setTimeout(() => go(A.claim.type === 'ioowe' ? 'io_amt' : 'ew_amt'), 1200);
    } else {
      // Not registered
      A.claim.personId     = null;
      A.claim.personName   = name;
      A.claim.pendingPhone = isPhone ? lookupKey : null;
      A.claim.pendingEmail = isPhone ? null : lookupKey;
      A.claim.isNameOnly   = false;
      if (statusEl) statusEl.textContent = '';
      go(A.claim.type === 'ioowe' ? 'io_amt' : 'ew_amt');
    }
  } catch(e) { 
    console.error('proceedNewPerson error:', e.code, e.message, e);
    if (statusEl) statusEl.textContent = '';
    showToast('Error: ' + (e.message || 'Something went wrong')); 
  }
}

function exportMyData() {
  const uid = A.user?.uid;
  const name = A.userDoc?.displayName || A.user?.displayName || 'Me';
  const now = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
  const allClaims = [...A.ledger, ...A.settled, ...A.pendingClaims, ...A.sentClaims]
    .filter((c, i, arr) => arr.findIndex(x => x.id === c.id) === i) // deduplicate
    .sort((a,b) => (b.date||'').localeCompare(a.date||''));

  const statusLabel = s => ({
    pending: 'Pending', queried: 'Queried', agreed: 'Agreed',
    settlement_pending: 'Payment claimed', settled: 'Settled',
    rejected: 'Rejected', cancelled: 'Cancelled'
  })[s] || s;

  const lines = [
    'ewe-o-me — Personal data export',
    'User: ' + name,
    'Exported: ' + now,
    '='.repeat(50),
    '',
    'OUTSTANDING BALANCE',
    '-'.repeat(30),
  ];

  // Balance summary
  const owedToMe = A.ledger.filter(c => c.creditorUid === uid).reduce((s,c) => s+c.amount, 0);
  const iOwe = A.ledger.filter(c => c.debtorUid === uid).reduce((s,c) => s+c.amount, 0);
  lines.push('Owed to me: ' + fmt(owedToMe));
  lines.push('I owe:      ' + fmt(iOwe));
  lines.push('Net:        ' + (owedToMe - iOwe >= 0 ? '+' : '') + fmt(owedToMe - iOwe));
  lines.push('');

  // All claims
  lines.push('ALL CLAIMS (' + allClaims.length + ' total)');
  lines.push('-'.repeat(30));
  allClaims.forEach(c => {
    const iCr = c.creditorUid === uid;
    const role = iCr ? 'OWED TO ME' : 'I OWE';
    const other = iCr ? c.debtorName : c.creditorName;
    lines.push('');
    lines.push(role + ' — ' + other);
    lines.push('  Amount:  ' + fmt(c.amount));
    lines.push('  For:     ' + (c.description || 'No description'));
    lines.push('  Date:    ' + (c.date ? fmtDate(c.date) : 'Unknown'));
    lines.push('  Status:  ' + statusLabel(c.status));
    if (c.rejectionNote) lines.push('  Note:    ' + c.rejectionNote);
  });

  lines.push('');
  lines.push('='.repeat(50));
  lines.push('End of export');

  const text = lines.join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'eweome-export-' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported!');
}

async function scanContactsForFriends() {
  const btn = document.getElementById('ff-scan-btn');
  const resultsEl = document.getElementById('ff-results');
  if (btn) { btn.textContent = 'Scanning...'; btn.disabled = true; }
  let contacts = [];
  try {
    if (window.AndroidBridge?.getAllContacts) {
      // APK: use native bulk contact scan
      const raw = window.AndroidBridge.getAllContacts();
      const parsed = JSON.parse(raw);
      // Convert to same format as Web Contacts API
      contacts = parsed.map(c => ({ name: [c.name], tel: [c.phone] }));
    } else if ('contacts' in navigator && 'ContactsManager' in window) {
      contacts = await navigator.contacts.select(['name','tel'],{multiple:true});
    } else {
      if (btn) { btn.textContent = 'Scan my contacts'; btn.disabled = false; }
      if (resultsEl) resultsEl.innerHTML = '<div style="text-align:center;padding:12px 0;font-size:13px;color:var(--text-2);">Contact scanning isn\'t available in this browser.</div>';
      return;
    }
  } catch(e) {
    if (btn) { btn.textContent = 'Scan my contacts'; btn.disabled = false; }
    return;
  }
  if (!contacts || contacts.length === 0) {
    if (btn) { btn.textContent = 'Scan my contacts'; btn.disabled = false; }
    return;
  }
  // Extract all phone numbers
  const phoneMap = {};
  for (const c of contacts) {
    const name = c.name?.[0] || '';
    for (const tel of (c.tel || [])) {
      const norm = normalisePhone(tel);
      if (norm) phoneMap[norm] = name;
    }
  }
  // Check each against users_by_phone in batches of 30
  const found = [];
  const phones = Object.keys(phoneMap);
  for (let i = 0; i < phones.length; i += 30) {
    const batch = phones.slice(i, i + 30);
    try {
      const snap = await db.collection('users_by_phone')
        .where(firebase.firestore.FieldPath.documentId(), 'in', batch).get();
      snap.docs.forEach(doc => {
        if (doc.data().uid !== A.user.uid) {
          found.push({ uid: doc.data().uid,
            name: doc.data().displayName || phoneMap[doc.id] || 'Unknown',
            phone: doc.id });
        }
      });
    } catch(e) {}
  }
  if (btn) btn.style.display = 'none';
  if (found.length === 0) {
    if (resultsEl) resultsEl.innerHTML = '<div style="text-align:center;padding:16px 0;"><div style="font-size:14px;color:var(--text-2);line-height:1.7;">None of your contacts are on ewe-o-me yet.<br><span style="font-size:12px;">You can invite them when you send a claim.</span></div></div>';
    return;
  }
  A._friendScanResults = found;
  if (resultsEl) {
    resultsEl.innerHTML = '<div style="font-size:13px;font-weight:500;color:var(--green-600);text-align:center;margin-bottom:12px;">' + found.length + ' contact' + (found.length > 1 ? 's' : '') + ' already on ewe-o-me!</div>'
      + found.map((f,i) => '<div id="ff-row-' + i + '" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);">'
        + '<div class="avatar">' + initials(f.name) + '</div>'
        + '<div style="flex:1;"><div style="font-size:14px;font-weight:500;">' + esc(f.name) + '</div></div>'
        + '<button id="ff-btn-' + i + '" class="btn btn-green" style="width:auto;padding:7px 14px;font-size:13px;" onclick="addFriendFromScan(' + i + ')">Add</button>'
        + '</div>').join('')
      + '<button class="btn btn-ghost" style="margin-top:12px;padding:11px;font-size:13px;" onclick="go(\'home\')">Done &rarr;</button>';
  }
}

async function addFriendFromScan(idx) {
  const f = A._friendScanResults?.[idx];

function computeMyGroupBalance(group) {
  const uid = A.user?.uid;
  const expenses = group.expenses || [];
  let owed = 0, owes = 0;
  expenses.forEach(e => {
    const split = computeSplits(e, group.memberUids || []);
    if (e.paidByUid === uid) {
      // I paid — others owe me their share
      split.forEach((amt, memberUid) => {
        if (memberUid !== uid) owed += amt;
      });
    } else {
      // Someone else paid — I owe my share
      const myShare = split.get(uid) || 0;
      owes += myShare;
    }
  });
  return { owed, owes, net: owed - owes };
}

function computeSplits(expense, memberUids) {
  const map = new Map();
  if (expense.splitType === 'equal') {
    const included = expense.includedUids || memberUids;
    const share = expense.amount / included.length;
    included.forEach(uid => map.set(uid, Math.round(share * 100) / 100));
  } else if (expense.splitType === 'custom') {
    (expense.customSplits || []).forEach(s => map.set(s.uid, s.amount));
  }
  return map;
}

function computeGroupBalances(group) {
  const uid = A.user?.uid;
  const members = group.memberUids || [];
  const net = {}; // net[uid] = how much they are owed (positive) or owe (negative)
  members.forEach(m => net[m] = 0);
  
  (group.expenses || []).forEach(e => {
    const splits = computeSplits(e, members);
    splits.forEach((amt, memberUid) => {
      if (memberUid !== e.paidByUid) {
        net[e.paidByUid] = (net[e.paidByUid] || 0) + amt;
        net[memberUid]    = (net[memberUid]    || 0) - amt;
      }
    });
  });
  return net;
}

// Computes group balances adjusted for exit claims already created for formerMembers.
// Zeroes out formerMember balances (they don't participate in active settle-up)
// and reduces active members' balances by any external payments they've already committed to.
async function getGroupAdjustedBalances(group) {
  const rawBalances = computeGroupBalances(group);
  const formerMemberSet = new Set(group.formerMembers || []);
  if (formerMemberSet.size === 0) return rawBalances;

  // Query claims created from this group (exit claims and settle-up claims)
  let exitClaims = [];
  try {
    const snap = await db.collection('claims')
      .where('groupId', '==', group.id)
      .get();
    exitClaims = snap.docs.map(d => ({ ...d.data(), id: d.id }))
      .filter(c => c.status !== 'cancelled' && c.status !== 'rejected' && c.status !== 'settled');
  } catch(e) {
    console.warn('getGroupAdjustedBalances: could not query claims', e);
    return rawBalances;
  }

  // Step 1: zero out formerMembers
  const adj = { ...rawBalances };
  formerMemberSet.forEach(uid => { if (adj[uid] !== undefined) adj[uid] = 0; });

  // Step 2: for claims between a formerMember and an active member,
  // adjust the active member's balance by the remaining amount
  // (they'll pay/receive externally via the real claim)
  const adjustments = {};
  exitClaims.forEach(c => {
    const credIsFormer = formerMemberSet.has(c.creditorUid);
    const debIsFormer  = formerMemberSet.has(c.debtorUid);
    const remaining = Math.max(0, (c.amount || 0) - (c.amountPaid || 0));
    if (remaining < 0.01) return;
    if (credIsFormer && !debIsFormer) {
      // Active debtor will pay formerMember externally — reduce their active balance magnitude
      adjustments[c.debtorUid] = (adjustments[c.debtorUid] || 0) + remaining;
    } else if (debIsFormer && !credIsFormer) {
      // Active creditor will receive from formerMember externally — reduce their active balance
      adjustments[c.creditorUid] = (adjustments[c.creditorUid] || 0) + remaining;
    }
  });

  Object.entries(adjustments).forEach(([uid, a]) => {
    if (adj[uid] > 0)      adj[uid] = Math.max(0, adj[uid] - a);
    else if (adj[uid] < 0) adj[uid] = Math.min(0, adj[uid] + a);
  });

  return adj;
}

async function previewSettleUp(groupId) {
  const group = (A.groups || []).find(g => g.id === groupId);
  if (!group) return;
  const uid = A.user?.uid;
  const formerMemberSet = new Set(group.formerMembers || []);

  // Use adjusted balances — accounts for exit claims already created, prevents double-counting
  const balances = await getGroupAdjustedBalances(group);
  const transfers = minimizeCashFlow(balances, group)
    .filter(t => !formerMemberSet.has(t.from) && !formerMemberSet.has(t.to));

  if (transfers.length === 0) {
    showModal('Everyone is already square — nothing to settle!', [{ label: 'Great!', style: 'btn-green', action: () => {} }]);
    return;
  }

  const myTransfers = transfers.filter(t => t.from === uid || t.to === uid);
  if (myTransfers.length === 0) {
    showModal('You\'re already square with everyone in this group.', [{ label: 'OK', style: 'btn-ghost', action: () => {} }]);
    return;
  }

  const lines = myTransfers.map(t => {
    const fromName = t.from === uid ? 'You' : t.fromName;
    const toName = t.to === uid ? 'you' : t.toName;
    return fromName + ' pay ' + toName + ' ' + fmt(t.amount);
  }).join('\n');

  showModal(
    '<div><div style="font-size:14px;font-weight:500;margin-bottom:10px;">Settle up preview</div>'
    + '<div style="font-size:13px;color:var(--text-2);line-height:1.8;">' + lines.replace(/\n/g,'<br>') + '</div>'
    + '<div style="font-size:12px;color:var(--text-3);margin-top:10px;">This will create claims between all members to record these payments.</div></div>',
    [
      { label: 'Create claims', style: 'btn-green', action: () => executeSettleUp(groupId, transfers) },
      { label: 'Cancel', style: 'btn-ghost', action: () => {} }
    ]
  );
}

function minimizeCashFlow(balances, group) {
  const uid = A.user?.uid;
  const memberNames = {};
  (A.connections || []).forEach(c => { if (c.uid || c.id) memberNames[c.uid || c.id] = c.name; });
  memberNames[uid] = A.userDoc?.displayName || 'Me';

  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([id, bal]) => {
    if (bal > 0.01) creditors.push({ id, bal, name: memberNames[id] || 'Unknown' });
    else if (bal < -0.01) debtors.push({ id, bal: -bal, name: memberNames[id] || 'Unknown' });
  });

  const transfers = [];
  let i = 0, j = 0;
  const cr = creditors.map(c => ({ ...c }));
  const de = debtors.map(d => ({ ...d }));
  while (i < cr.length && j < de.length) {
    const amt = Math.min(cr[i].bal, de[j].bal);
    if (amt > 0.01) {
      transfers.push({ from: de[j].id, fromName: de[j].name, to: cr[i].id, toName: cr[i].name, amount: Math.round(amt * 100) / 100 });
    }
    cr[i].bal -= amt; de[j].bal -= amt;
    if (cr[i].bal < 0.01) i++;
    if (de[j].bal < 0.01) j++;
  }
  return transfers;
}

async function executeSettleUp(groupId, transfers) {
  const uid = A.user?.uid;
  const myName = A.userDoc?.displayName || 'Someone';
  const today = new Date().toISOString().split('T')[0];
  const group = (A.groups || []).find(g => g.id === groupId);
  const groupName = group?.name || 'group';

  for (const t of transfers) {
    // Only create claims involving the current user
    if (t.from !== uid && t.to !== uid) continue;
    try {
      await db.collection('claims').add({
        creditorUid:  t.to,
        creditorName: t.to === uid ? myName : t.toName,
        debtorUid:    t.from,
        debtorName:   t.from === uid ? myName : t.fromName,
        amount:       t.amount,
        description:  'Settle up: ' + groupName,
        status:       'pending',
        type:         'eweome',
        participants: [t.to, t.from],
        date:         today,
        groupId:      groupId,
        createdAt:    firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:    firebase.firestore.FieldValue.serverTimestamp()
      });
      if (t.to !== uid) sendPushNotification(t.to, myName + ' has sent a settle-up claim', fmt(t.amount) + ' for ' + groupName);
      if (t.from !== uid) sendPushNotification(t.from, myName + ' has sent a settle-up claim', fmt(t.amount) + ' for ' + groupName);
    } catch(e) { console.error('executeSettleUp error:', e); }
  }
  showToast('Claims created — check your Pending tab!');
  go('pending');
}
