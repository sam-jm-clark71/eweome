async function deleteOrCloseGroup(groupId) {
  const group = (A.groups || []).find(g => g.id === groupId);
  if (!group) return;
  const hasExpenses = (group.expenses || []).length > 0;
  if (!hasExpenses) {
    showModal('Delete this group? It has no expenses so nothing will be lost.', [
      { label: 'Delete group', style: 'btn-red', action: () => deleteGroup(groupId) },
      { label: 'Cancel', style: 'btn-ghost', action: () => {} }
    ]);
    return;
  }
  const balances = await getGroupAdjustedBalances(group);
  const formerMemberSet2 = new Set(group.formerMembers || []);
  const hasOutstanding = Object.entries(balances).some(([uid, b]) => !formerMemberSet2.has(uid) && Math.abs(b) > 0.01);
  if (!hasOutstanding) {
    showModal('Everyone\'s all square in this group. Close and delete it?', [
      { label: 'Close group', style: 'btn-red', action: () => deleteGroup(groupId) },
      { label: 'Cancel', style: 'btn-ghost', action: () => {} }
    ]);
    return;
  }
  // Outstanding balances — offer settle & close or delete without settling
  showModal(
    '<div><div style="font-size:14px;font-weight:500;margin-bottom:8px;">This group has outstanding balances</div>'
    + '<div style="font-size:13px;color:var(--text-2);line-height:1.6;">You can settle up and close — which creates normal pending claims between all members for the remaining balances — or just delete the group and lose the history.</div></div>',
    [
      { label: 'Settle & close', style: 'btn-green', action: () => settleAndCloseGroup(groupId) },
      { label: 'Delete without settling', style: 'btn-red', action: () => {
          showModal('Are you sure? All expense history for this group will be permanently lost.', [
            { label: 'Yes, delete it', style: 'btn-red', action: () => deleteGroup(groupId) },
            { label: 'Cancel', style: 'btn-ghost', action: () => {} }
          ]);
        }
      },
      { label: 'Cancel', style: 'btn-ghost', action: () => {} }
    ]
  );
}

async function settleAndCloseGroup(groupId) {
  const group = (A.groups || []).find(g => g.id === groupId);
  if (!group) return;
  const uid = A.user?.uid;
  const myName = A.userDoc?.displayName || 'Someone';
  const today2 = new Date().toISOString().split('T')[0];
  const groupName = group.name || 'group';
  const balances = await getGroupAdjustedBalances(group);
  const formerMembers2 = new Set(group.formerMembers || []);
  const allTransfers2 = minimizeCashFlow(balances, group);
  const transfers = allTransfers2.filter(t => !formerMembers2.has(t.from) && !formerMembers2.has(t.to));
  if (transfers.length === 0) {
    await deleteGroup(groupId);
    return;
  }
  // Build member name map
  const memberNames = {};
  (A.connections || []).forEach(c => { if (c.uid || c.id) memberNames[c.uid || c.id] = c.name; });
  memberNames[uid] = myName;
  // Create claims for ALL pairs (not just current user)
  let created = 0;
  for (const t of transfers) {
    try {
      const credName = t.to === uid ? myName : (memberNames[t.to] || t.toName || 'Unknown');
      const debName  = t.from === uid ? myName : (memberNames[t.from] || t.fromName || 'Unknown');
      await db.collection('claims').add({
        creditorUid:  t.to,
        creditorName: credName,
        debtorUid:    t.from,
        debtorName:   debName,
        amount:       t.amount,
        description:  'Settle up: ' + groupName,
        status:       'pending',
        type:         'eweome',
        participants: [t.to, t.from],
        date:         today2,
        groupId:      groupId,
        createdAt:    firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:    firebase.firestore.FieldValue.serverTimestamp()
      });
      created++;
      // Notify both parties if neither is the current user, or the other party if one is
      if (t.to !== uid)   sendPushNotification(t.to,   myName + ' settled up group: ' + groupName, fmt(t.amount) + ' claim sent');
      if (t.from !== uid) sendPushNotification(t.from, myName + ' settled up group: ' + groupName, fmt(t.amount) + ' claim sent');
    } catch(e) { console.error('settleAndCloseGroup claim error:', e); }
  }
  await deleteGroup(groupId, true);
  showToast(created + ' claim' + (created !== 1 ? 's' : '') + ' created — group closed.');
  go('pending');
}

async function deleteGroup(groupId, silent) {
  try {
    await db.collection('groups').doc(groupId).delete();
    if (!silent) showToast('Group deleted.');
    go('groups');
  } catch(e) {
    showToast('Could not delete group. Please try again.');
  }
}

async function leaveGroup(groupId) {
  const group = (A.groups || []).find(g => g.id === groupId);
  if (!group) return;
  const uid = A.user?.uid;
  const myName = A.userDoc?.displayName || 'Someone';

  // Compute transfers using adjusted balances — accounts for prior exit claims
  const formerMemberSet = new Set(group.formerMembers || []);
  const adjBalances = await getGroupAdjustedBalances(group);
  const allTransfers = minimizeCashFlow(adjBalances, group);
  // Only include transfers involving the leaving member AND not involving any formerMember
  const myTransfers = allTransfers.filter(t =>
    (t.from === uid || t.to === uid) &&
    !formerMemberSet.has(t.from) &&
    !formerMemberSet.has(t.to)
  );

  if (myTransfers.length === 0) {
    // No outstanding balance — simple leave
    const willBeAlone = (group.memberUids || []).length <= 2;
    const aloneNote = willBeAlone ? '\n\nThis will leave ' + esc((group.memberNames || {})[group.createdBy] || 'the creator') + ' as the only member — they\'ll need to delete the group themselves.' : '';
    showModal('Leave this group? You won\'t see it any more, but it will remain for the other members.\n\nNote: your balance is calculated based on current expenses. Any expenses added after you leave won\'t change what you owe.' + aloneNote, [
      { label: 'Leave group', style: 'btn-red', action: () => doLeaveGroup(groupId, uid, []) },
      { label: 'Cancel', style: 'btn-ghost', action: () => {} }
    ]);
    return;
  }

  // Build member name map

  showModal(
    '<div>'
    + '<div style="font-size:14px;font-weight:500;margin-bottom:8px;">Your group debts will become real claims</div>'
    + '<div style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:10px;">You have an outstanding balance in this group. To protect everyone, these will be converted to normal claims before you leave:</div>'
    + myTransfers.map(t => {
        const iMePay = t.from === uid;
        const otherName = iMePay ? (memberNames[t.to] || t.toName || 'Unknown') : (memberNames[t.from] || t.fromName || 'Unknown');
        const col = iMePay ? 'var(--red-600)' : 'var(--green-600)';
        const text = iMePay ? 'You owe ' + esc(otherName) : esc(otherName) + ' owes you';
        return '<div style="padding:8px 10px;background:var(--surface);border-radius:var(--radius-sm);border:0.5px solid var(--border);margin-bottom:6px;display:flex;justify-content:space-between;">'
          + '<span style="font-size:13px;">' + text + '</span>'
          + '<span style="font-size:13px;font-weight:500;color:' + col + ';">' + fmt(t.amount) + '</span>'
          + '</div>';
      }).join('')
    + '<div style="font-size:12px;color:var(--text-3);margin-top:6px;line-height:1.5;">These will appear in everyone\'s Pending tab.</div>'
    + '</div>',
    [
      { label: 'Create claims & leave', style: 'btn-green', action: () => doLeaveGroup(groupId, uid, myTransfers) },
      { label: 'Cancel', style: 'btn-ghost', action: () => {} }
    ]
  );
}

async function doLeaveGroup(groupId, uid, transfers) {
  const group = (A.groups || []).find(g => g.id === groupId);
  if (!group) return;
  const myName = A.userDoc?.displayName || 'Someone';
  const memberNames = group.memberNames || {};
  const today2 = new Date().toISOString().split('T')[0];
  try {
    // Create real pending claims for each transfer involving this member
    for (const t of transfers) {
      const credName = t.to === uid ? myName : (memberNames[t.to] || t.toName || 'Unknown');
      const debName  = t.from === uid ? myName : (memberNames[t.from] || t.fromName || 'Unknown');
      await db.collection('claims').add({
        creditorUid:  t.to,
        creditorName: credName,
        debtorUid:    t.from,
        debtorName:   debName,
        amount:       t.amount,
        description:  'From group: ' + (group.name || 'group'),
        status:       'pending',
        type:         'eweome',
        participants: [t.to, t.from],
        date:         today2,
        groupId:      groupId,
        createdAt:    firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:    firebase.firestore.FieldValue.serverTimestamp()
      });
      // Notify the other party to this specific claim
      const otherUid = t.from === uid ? t.to : t.from;
      sendPushNotification(otherUid, myName, 'left ' + (group.name || 'a group') + ' — a claim has been created');
    }
    // Notify any remaining group members who weren't involved in a direct claim
    const notifiedAlready = new Set(transfers.map(t => t.from === uid ? t.to : t.from));
    (group.memberUids || []).forEach(m => {
      if (m !== uid && !notifiedAlready.has(m)) {
        sendPushNotification(m, myName, 'has left ' + (group.name || 'the group'));
      }
    });
    // Remove member from group, tracking them as a former member so settle-up doesn't duplicate their extracted claims
    const newUids = (group.memberUids || []).filter(u => u !== uid);
    const newNames = { ...(group.memberNames || {}) };
    delete newNames[uid];
    const formerMembers = [...new Set([...(group.formerMembers || []), uid])];
    await db.collection('groups').doc(groupId).update({
      memberUids: newUids,
      memberNames: newNames,
      formerMembers,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast(transfers.length > 0 ? 'Claims created and you\'ve left the group.' : 'You\'ve left the group.');
    go('groups');
  } catch(e) { showToast('Could not leave group. Please try again.'); }
}

async function addGroupExpense() {
  const desc = document.getElementById('exp-desc')?.value.trim();
  const amount = parseFloat(document.getElementById('exp-amount')?.value);
  const paidByUid = document.getElementById('exp-paidby')?.value;
  const group = (A.groups||[]).find(g => g.id === A.selectedGroupId);
  if (!desc) { showToast('Please enter a description.'); return; }
  if (!amount || amount <= 0) { showToast('Please enter an amount.'); return; }
  if (!group) return;

  const splitType = A._expenseSplit || 'equal';
  const memberNames = group.memberNames || {};
  let customSplits = null;

  if (splitType === 'custom') {
    customSplits = (group.memberUids||[]).map(m => ({
      uid: m,
      amount: parseFloat(document.getElementById('custom-' + m)?.value || '0') || 0
    })).filter(s => s.amount > 0);
    const total = customSplits.reduce((s,c) => s+c.amount, 0);
    if (Math.abs(total - amount) > 0.02) {
      showToast('Custom splits must add up to ' + fmt(amount)); return;
    }
  }

  const expense = {
    id: Date.now().toString(),
    description: desc,
    amount,
    paidByUid,
    paidByName: memberNames[paidByUid] || paidByUid,
    splitType,
    includedUids: splitType === 'equal' ? (A._expenseIncluded || group.memberUids) : null,
    customSplits,
    addedByUid: A.user?.uid,
    addedAt: new Date().toISOString()
  };

  try {
    await db.collection('groups').doc(A.selectedGroupId).update({
      expenses: firebase.firestore.FieldValue.arrayUnion(expense),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // Notify all other group members
    const myName = A.userDoc?.displayName || 'Someone';
    const myUid = A.user?.uid;
    (group.memberUids || []).forEach(uid => {
      if (uid !== myUid) sendPushNotification(uid, myName, 'added an expense to ' + group.name + ': ' + desc + ' (' + fmt(amount) + ')');
    });
    A._expenseSplit = 'equal';
    A._expenseIncluded = null;
    showToast('Expense added!');
    go('group_detail');
  } catch(e) { showToast('Could not add expense. Please try again.'); }
}

function maskEmail(email) {
  if (!email) return '';
  const [local, domain] = email.split('@');
  if (!domain) return email;
  const domainParts = domain.split('.');
  const tld = domainParts.pop();
  const domainName = domainParts.join('.');
  const maskedLocal  = local.length <= 2  ? local[0] + '***'
                     : local[0] + '***' + local[local.length - 1];
  const maskedDomain = domainName.length <= 2 ? domainName[0] + '***'
                     : domainName[0] + '***' + domainName[domainName.length - 1];
  return maskedLocal + '@' + maskedDomain + '.' + tld;
}

async function signIntoExistingAccount() {
  const currentUser = auth.currentUser;
  const existingUid = A.mergeUid;
  if (!existingUid) return;
  try {
    showToast('Merging accounts…');
    const phone = A._pendingPhone || (currentUser?.phoneNumber || '').replace(/\s/g,'');
    const existingDoc = await db.collection('users').doc(existingUid).get();
    const existingName = existingDoc.exists ? existingDoc.data().displayName : '';

    // Transfer claims from current account to existing account
    if (currentUser && currentUser.uid !== existingUid) {
      const asCred = await db.collection('claims').where('creditorUid','==',currentUser.uid).get();
      const asDebt = await db.collection('claims').where('debtorUid','==',currentUser.uid).get();
      const batch = db.batch();
      asCred.docs.forEach(d => {
        batch.update(d.ref, {
          creditorUid: existingUid,
          creditorName: existingName || d.data().creditorName,
          participants: [existingUid, d.data().debtorUid],
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
      asDebt.docs.forEach(d => {
        batch.update(d.ref, {
          debtorUid: existingUid,
          debtorName: existingName || d.data().debtorName,
          participants: [d.data().creditorUid, existingUid],
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
      await batch.commit();
    }

    // Link phone to existing account
    if (phone) {
      await db.collection('users_by_phone').doc(phone).set({ uid: existingUid, displayName: existingName });
      await db.collection('users').doc(existingUid).update({ phone });
    }

    // Clean up the duplicate user doc and email lookup
    if (currentUser && currentUser.uid !== existingUid) {
      await db.collection('users').doc(currentUser.uid).delete().catch(() => {});
      // Clean up users_by_email entry for the abandoned account
      if (currentUser.email) {
        await db.collection('users_by_email').doc(currentUser.email.toLowerCase()).delete().catch(() => {});
      }
    }

    A.mergeUid = null; A.mergeName = ''; A.mergeEmail = ''; A._pendingPhone = null;

    // In both cases, sign out and ask them to sign in with their existing account
    await auth.signOut();
    A.signinMode = 'choose';
    showToast('Accounts merged! Please sign in with your existing account.');
    go('signin');
  } catch(e) {
    console.error('Merge error:', e);
    showToast('Could not merge accounts. Please try signing in with your existing account directly.');
    await auth.signOut();
    go('signin');
  }
}

async function keepNewAccount() {
  A.mergeUid = null; A.mergeName = ''; A.mergeEmail = ''; A._pendingPhone = null;
  await ensureUserDoc(A.user);

}

================================================================ */
function inviteContact(name) {
  const text = (name?name+', ':'') + "I'd like to add you on ewe-o-me, an app for tracking who owes what. Join: https://eweome-41e0f.web.app";
  if (navigator.share) navigator.share({text}).catch(()=>{}); else window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}

function buildShareText(claim, isNewContact) {
  const myName = A.userDoc?.displayName || A.user?.displayName || 'Someone';
  const io = claim.type === 'ioowe';
  const amount = fmt(claim.amount);
  const desc = claim.description || '';
  const date = claim.date ? fmtDate(claim.date) : '';
  const onAcct = claim.onAccount ? ' There\'s no rush to pay.' : '';
  const appUrl = 'https://eweome-41e0f.web.app';

  if (isNewContact) {
    // Wordy intro version for people who may not have the app
    const direction = io
      ? `I wanted to let you know that I owe you ${amount}${desc ? ' for ' + desc : ''}${date ? ' (' + date + ')' : ''}.`
      : `I wanted to remind you that you owe me ${amount}${desc ? ' for ' + desc : ''}${date ? ' (' + date + ')' : ''}.`;
    return `Hi! ${direction}${onAcct}

`
      + `I'm using an app called ewe-o-me to keep track of money between friends and family — it makes it easy to log debts, agree amounts, and mark things as settled when they're paid. No payments go through the app, it's just a shared record.

`
      + `It would be great if you joined too so we can keep track of this together: ${appUrl}`;
  } else {
    // Short version for existing contacts
    const direction = io
      ? `Just a heads up — I've logged that I owe you ${amount}${desc ? ' for ' + desc : ''}${date ? ' (' + date + ')' : ''}.`
      : `Reminder — you owe me ${amount}${desc ? ' for ' + desc : ''}${date ? ' (' + date + ')' : ''}.`;
    return `${direction}${onAcct}

(Sent via ewe-o-me — ${appUrl})`;
  }
}

function shareViaSystem(claimId) {
  const all=[...A.pendingClaims,...A.sentClaims,...A.ledger,...(A.settled||[])];
  const claim=all.find(c=>c.id===claimId); if(!claim) return;
  // Check if recipient is an existing connection
  const recipientUid = claim.type==='ioowe' ? claim.creditorUid : claim.debtorUid;
  const isNew = !(A.connections||[]).some(c => c.id === recipientUid);
  const text=buildShareText(claim, isNew);
  // Use direct WhatsApp link if we have the recipient's phone
  const conn = (A.connections||[]).find(c => c.uid === recipientUid || c.id === recipientUid);
  const recipientPhone = conn?.phone ? conn.phone.replace(/[^\d+]/g,'') : 
    (claim.pendingPhone ? claim.pendingPhone.replace(/[^\d+]/g,'') : null);
  const waUrl = recipientPhone 
    ? 'https://wa.me/' + recipientPhone + '?text=' + encodeURIComponent(text)
    : 'https://wa.me/?text=' + encodeURIComponent(text);
  if(navigator.share) navigator.share({text}).catch(()=>{}); else window.open(waUrl,'_blank');
}

function skipClaim(id) {
  const idx=A.pendingClaims.findIndex(c=>c.id===id);
  if(idx>=0){const s=A.pendingClaims.splice(idx,1)[0];A.pendingClaims.push(s);}
  const next=A.pendingClaims.find(c=>c.id!==id);
  if(next){A.selectedClaimId=next.id;go('req_detail');}else go('pending');

async function confirmBulkSettle(personId) {
  A.confirmBulkSettle = null;
  const outstanding = A.ledger.filter(c =>
    (c.creditorUid === A.user.uid && c.debtorUid === personId) ||
    (c.creditorUid === personId && c.debtorUid === A.user.uid)
  );
  const batch = db.batch();
  const now = firebase.firestore.FieldValue.serverTimestamp();
  outstanding.forEach(c => {
    batch.update(db.collection('claims').doc(c.id), { status: 'settled', updatedAt: now });
  });
  try {
    await batch.commit();
    if (outstanding.length > 0) {
      const sample = outstanding[0];
      const iAmCred = sample.creditorUid === A.user.uid;
      const toUid = iAmCred ? personId : sample.creditorUid;
      sendPushNotification(
        toUid,
        (A.userDoc?.displayName||'Someone') + ' marked everything as settled',
        'Your balance has been cleared — ' + outstanding.length + ' item' + (outstanding.length > 1 ? 's' : '') + ' settled'
      );
    }
    go('position');
  } catch(e) { showToast('Something went wrong. Please try again.'); }
}

async function removeConnection(id) {
  const conn = (A.connections||[]).find(c=>c.id===id);
  showModal('Remove ' + (conn?.name || 'this connection') + '?', [
    { label: 'Remove', style: 'btn-red', action: async () => {
      const updated = (A.connections||[]).filter(c=>c.id!==id);
      // Save to removedConnections so auto-add won't re-add them
      const removed = [...new Set([...(A.userDoc?.removedConnections||[]), id])];
      try { 
        await db.collection('users').doc(A.user.uid).update({
          connections: updated,
          removedConnections: removed
        }); 
        A.connections = updated;
        if (A.userDoc) A.userDoc.removedConnections = removed;
        render(); 
      } catch(e){showToast('Something went wrong. Please try again.');}
    }},
    { label: 'Cancel', style: 'btn-ghost', action: () => {} }
  ]);
}

async function pickFromContacts() {
  // Use native Android bridge if available (APK)

  }
  // Web Contact API fallback (Chrome browser)
  try {

    if(!contacts||contacts.length===0) return;
    if(contacts.length===1){
      const c=contacts[0];
      const el=document.getElementById('nc-name'); if(el) el.value=(c.name&&c.name[0])||'';
      const el2=document.getElementById('nc-email'); if(el2) el2.value=(c.tel&&c.tel[0])||(c.email&&c.email[0])||'';
    } else { await addMultipleContacts(contacts); }
  } catch(e){console.log('Contact picker cancelled');}
}

async function addMultipleContacts(contacts) {
  const existing=A.connections||[];
  const existingKeys=new Set(existing.map(c=>(c.email||c.id||'').toLowerCase()));
  const toAdd=[];
  for(const c of contacts){
    const name=(c.name&&c.name[0])||'';
    const tel=(c.tel&&c.tel[0])||'';
    const email=(c.email&&c.email[0])||'';
    const key=(tel||email||'').toLowerCase();
    if(!name||!key||existingKeys.has(key)) continue;
    existingKeys.add(key);
    toAdd.push({id:'pending_'+Date.now()+'_'+toAdd.length,name,email:key,uid:null,color:(existing.length+toAdd.length)%2===0?'':'amber',addedAt:new Date().toISOString()});
  }
  if(toAdd.length===0) return;
  const merged=[...existing,...toAdd];
  try{
    await db.collection('users').doc(A.user.uid).update({connections:merged});
    A.connections=merged;
    const back=A.claim&&A.claim.type?(A.claim.type==='ioowe'?'io_who':'ew_who'):'settings';
    go(back);
  }catch(e){showToast('Something went wrong. Please try again.');}
}

async function addConnection() {
  const nameEl  = document.getElementById('nc-name');
  const emailEl = document.getElementById('nc-email');
  const name    = nameEl?.value.trim();
  const email   = emailEl?.value.trim().toLowerCase();

  if (!name || !email) {
    if (nameEl)  nameEl.style.borderColor  = '#E24B4A';
    if (emailEl) emailEl.style.borderColor = '#E24B4A';
    return;
  }

  try {
    // Look up whether they've already registered
    const isPhone = /^[+\d]/.test(email);
    const lookupKey = isPhone ? normalisePhone(email) : email.toLowerCase();
    let snap = await db.collection('users_by_phone').doc(lookupKey).get();
    if (!snap.exists) snap = await db.collection('users_by_email').doc(lookupKey).get();
    let theirUid = snap.exists ? snap.data().uid : null;
    let theirName = snap.exists ? (snap.data().displayName || name) : name;

    // Fallback: search users collection directly by phone field
    // (handles case where users_by_phone wasn't updated)
    if (!theirUid && isPhone) {
      const usersSnap = await db.collection('users').where('phone', '==', lookupKey).limit(1).get();
      if (!usersSnap.empty) {
        theirUid = usersSnap.docs[0].id;
        theirName = usersSnap.docs[0].data().displayName || name;
        // Fix the missing users_by_phone entry
        await db.collection('users_by_phone').doc(lookupKey).set({ uid: theirUid, displayName: theirName });
        console.log('Fixed missing users_by_phone entry for', lookupKey);
      }
    }
    // Fallback: search users collection by email
    if (!theirUid && !isPhone) {
      const usersSnap = await db.collection('users').where('email', '==', lookupKey).limit(1).get();
      if (!usersSnap.empty) {
        theirUid = usersSnap.docs[0].id;
        theirName = usersSnap.docs[0].data().displayName || name;
        await db.collection('users_by_email').doc(lookupKey).set({ uid: theirUid, displayName: theirName });
        console.log('Fixed missing users_by_email entry for', lookupKey);
      }
    }

    A._connNotFound = !theirUid;
    A._connNotFoundName = !theirUid ? (document.getElementById('nc-name')?.value.trim() || '') : '';

    // Try to get their phone number if we found them
    let theirPhone = '';
    if (theirUid) {
      try {
        const theirDoc = await db.collection('users').doc(theirUid).get();
        if (theirDoc.exists) theirPhone = theirDoc.data().phone || '';
      } catch(e) {}
    }
    const conn = {
      id:      theirUid || ('pending_' + Date.now()),
      name:    theirUid ? (theirName || name) : name,
      email:   isPhone ? '' : email,
      phone:   isPhone ? lookupKey : theirPhone,
      uid:     theirUid,
      color:   A.connections.length % 2 === 0 ? '' : 'amber',
      addedAt: new Date().toISOString()
    };

    // Remove any existing entries for same email OR same uid
    const filtered = A.connections.filter(c => 
      c.email !== email && 
      !(theirUid && c.uid === theirUid) &&
      !(theirUid && c.id === theirUid)
    );
    const updated = [...filtered, conn];
    // Remove from removedConnections if they were previously manually removed
    const removedConns = (A.userDoc?.removedConnections || []).filter(id => id !== theirUid);
    await db.collection('users').doc(A.user.uid).update({ connections: updated, removedConnections: removedConns });
    if (A.userDoc) A.userDoc.removedConnections = removedConns;
    A.connections = updated;

    if (A.claim.type) {
      A.claim.personId   = conn.id;
      A.claim.personName = conn.name;
      go(pfx() + '_amt');
    } else {
      go('settings');
    }
  } catch(e) {
    showToast('Could not add connection. Please try again.');
  }
}

/* ================================================================
   FIREBASE AUTH
================================================================ */
function autoFormatPhone(el) {
  let v = el.value.trim();
  if (v.startsWith('0') && !v.startsWith('00')) el.value = '+44 ' + v.slice(1);
}

function normalisePhone(raw) {
  let v = (raw||'').trim().replace(/[\s\-().]/g,'');
  if (v.startsWith('00')) v = '+' + v.slice(2);
  if (v.startsWith('0')) v = '+44' + v.slice(1);
  return v;
}

async function signInEmail(isNew) {
  A.signinError = '';
  const email = document.getElementById('si-email')?.value.trim();
  const pass  = document.getElementById('si-pass')?.value;
  if (!email || !pass) { A.signinError = 'Please enter your email and password.'; render(); return; }
  try {
    if (isNew) await auth.createUserWithEmailAndPassword(email, pass);
    else       await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) { A.signinError = e.message.replace('Firebase: ','').replace(/ \(auth\/.*\)\.?/,''); render(); }
}

async function signInPhone() {
  A.signinError = '';
  const rawPhone = document.getElementById('si-phone')?.value.trim();
  if (!rawPhone) { A.signinError = 'Please enter your phone number.'; render(); return; }
  const phone = normalisePhone(rawPhone);
  try {
    if (!A._phoneVerifier) A._phoneVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
    A.phoneNumber = phone;
    A._confirmResult = await auth.signInWithPhoneNumber(phone, A._phoneVerifier);
    A.phoneStep = 'code'; render();
  } catch(e) { A.signinError = 'Could not send code. Check the number and try again.'; A._phoneVerifier = null; render(); }
}

async function verifyCode() {
  A.signinError = '';
  const code = document.getElementById('si-code')?.value.trim();
  if (!code) { A.signinError = 'Please enter the code.'; render(); return; }
  try { await A._confirmResult.confirm(code); }
  catch(e) { A.signinError = 'Incorrect code. Please try again.'; render(); }
}

window.handleNativeGoogleSignIn = async function(idToken) {
  try {
    const credential = firebase.auth.GoogleAuthProvider.credential(idToken);
    await auth.signInWithCredential(credential);
  } catch(e) { A.signinError = 'Sign-in failed: ' + e.message; render(); }
};
window.handleNativeGoogleSignInError = function(msg) {
  A.signinError = 'Google sign-in failed. Please try phone or email instead.';
  render();
};

async function signIn() {
  if (window.isAndroidApp && window.AndroidBridge) { window.AndroidBridge.startGoogleSignIn(); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  try { await auth.signInWithPopup(provider); }
  catch(e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      await auth.signInWithRedirect(provider);
    } else { A.signinError = 'Sign-in failed. Please try again.'; render(); }
  }
}

function doSignOut() {
  A._unsubs.forEach(fn => fn());
  A._unsubs = [];
  A.signinMode = 'choose'; A.phoneStep = 'number'; A.signinError = ''; A._phoneVerifier = null; A._pendingShown = false;
  auth.signOut();
}

/* ================================================================
   FIRESTORE: USER SETUP
================================================================ */
async function ensureUserDoc(fbUser) {
  const ref  = db.collection('users').doc(fbUser.uid);
  const snap = await ref.get();

  if (!snap.exists) {
    const displayName = fbUser.displayName || fbUser.email || fbUser.phoneNumber || 'User';
    const data = {
      displayName,
      email:    fbUser.email    || null,
      phone:    fbUser.phoneNumber || null,
      photoURL: fbUser.photoURL || null,
      connections: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    await ref.set(data);
    if (fbUser.email) {
      await db.collection('users_by_email').doc(fbUser.email.toLowerCase()).set({ uid: fbUser.uid, displayName });
      await db.collection('users_by_phone').doc(fbUser.email.toLowerCase()).set({ uid: fbUser.uid, displayName });
    }
    if (fbUser.phoneNumber) {
      const pn = fbUser.phoneNumber.replace(/\s/g,'');
      await db.collection('users_by_phone').doc(pn).set({ uid: fbUser.uid, displayName });
    }
    if (!fbUser.phoneNumber) A.needsOnboarding = true;
  }
  // Check if display name is missing or is just a phone number
  const name = A.userDoc?.displayName || fbUser.displayName || '';
  const looksLikePhone = /^[+\d\s]{7,}$/.test(name.trim());
  // Only show name prompt if name is completely missing
  // Don't interrupt existing users whose name happens to look like a phone
  const hasConnections = (A.userDoc?.connections || []).length > 0;
  A.needsDisplayName = !name && !hasConnections;
}

/* ================================================================
   FIRESTORE: REAL-TIME LISTENERS
================================================================ */
function subscribeToData(uid) {
  // Clean up previous listeners
  A._unsubs.forEach(fn => fn());
  A._unsubs = [];

  // Simplifications involving this user
  const s1 = db.collection('simplifications')
    .where('participants', 'array-contains', uid)
    .where('status', '==', 'pending_consent')
    .onSnapshot(snap => {
      A.simplifications = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!['loading','signin'].includes(A.screen)) render();
    }, () => {});
  A._unsubs.push(s1);

  // Groups
  const g1 = db.collection('groups')
    .where('memberUids', 'array-contains', uid)
    .onSnapshot(snap => {
      A.groups = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!['loading','signin'].includes(A.screen)) render();
    }, () => {});
  A._unsubs.push(g1);

  // User doc (connections)
  const u1 = db.collection('users').doc(uid)
    .onSnapshot(snap => {
      if (snap.exists) {
        A.userDoc      = snap.data();
        A.connections  = snap.data().connections || [];
        enrichConnectionsFromPhoneLookup(uid);
      }
      if (!['loading','signin'].includes(A.screen)) {
        checkDueClaims();
        // Pending-first: redirect to pending screen on fresh load if items exist
        if (A.screen === 'home' && A.pendingClaims.length > 0 && !A._pendingShown) {
          A._pendingShown = true;
          go('pending');
        } else {
          render();
        }
      }
    });
  A._unsubs.push(u1);

  // All claims involving this user — real-time
  const u2 = db.collection('claims')
    .where('participants', 'array-contains', uid)
    .orderBy('createdAt', 'desc')
    .onSnapshot(snap => {
      const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // Load personal notes
      db.collection('users').doc(uid).collection('notes').orderBy('createdAt','desc')
        .get().then(snap => { A.notes = snap.docs.map(d => ({id:d.id,...d.data()})); render(); }).catch(()=>{});

      // Auto-add connections from claims, but respect manually removed contacts
      const removedIds = new Set((A.userDoc?.removedConnections || []));
      const connIds = new Set((A.connections||[]).map(c => c.id));
      const toAdd = [];
      all.forEach(c => {
        // Fix name if existing connection has blank/phone-number name
        const fixConnName = (existingId, betterName) => {
          if (!betterName || /^[+\d\s]{7,}$/.test(betterName.trim())) return;
          const ci = A.connections.findIndex(x => x.id === existingId);
          if (ci >= 0 && (!A.connections[ci].name || /^[+\d\s]{7,}$/.test((A.connections[ci].name||'').trim()))) {
            A.connections[ci].name = betterName;
          }
        };
        if (c.creditorUid === uid && c.debtorUid && c.debtorUid !== uid && !removedIds.has(c.debtorUid)) {
          if (!connIds.has(c.debtorUid)) {
            connIds.add(c.debtorUid);
            toAdd.push({ id: c.debtorUid, name: c.debtorName, email: '', uid: c.debtorUid, color: toAdd.length % 2 === 0 ? '' : 'amber', addedAt: new Date().toISOString() });
          } else { fixConnName(c.debtorUid, c.debtorName); }
        } else if (c.debtorUid === uid && c.creditorUid && c.creditorUid !== uid && !removedIds.has(c.creditorUid)) {
          if (!connIds.has(c.creditorUid)) {
            connIds.add(c.creditorUid);
            toAdd.push({ id: c.creditorUid, name: c.creditorName, email: '', uid: c.creditorUid, color: toAdd.length % 2 === 0 ? '' : 'amber', addedAt: new Date().toISOString() });
          } else { fixConnName(c.creditorUid, c.creditorName); }
        }
      });
      const cleanedConns = (A.connections||[]).filter(c => c.id !== uid && c.uid !== uid);
      if (cleanedConns.length < (A.connections||[]).length) {
        db.collection('users').doc(uid).update({ connections: cleanedConns }).catch(()=>{});
        A.connections = cleanedConns;
      }
      // Enrich existing connections that have uid but no email/phone
      // by checking if we can find their details from users_by_phone
      if (toAdd.length > 0) {
        const merged = [...(A.connections||[]), ...toAdd];
        db.collection('users').doc(uid).update({ connections: merged }).catch(() => {});
        enrichConnectionsFromPhoneLookup(uid);
        A.connections = merged;
      }

      // Incoming & needs my action (including rejected claims the creditor hasn't dismissed)
      A.pendingClaims = all.filter(c => c.status !== 'cancelled' && (
        // YOM: debtor needs to action
        (c.status === 'pending'             && c.debtorUid   === uid && c.type !== 'ioowe') ||
        // IOU: creditor needs to action (they received the IOU)
        (c.status === 'pending'             && c.creditorUid === uid && c.type === 'ioowe') ||
        (c.status === 'queried'             && c.creditorUid === uid) ||
        (c.status === 'queried'             && c.debtorUid   === uid && c.answeredQuestion) ||
        (c.status === 'evidence_requested'  && c.creditorUid === uid) ||
        (c.status === 'evidence_requested'  && c.debtorUid   === uid && c.evidenceUrl) ||
        (c.status === 'settlement_pending'  && c.creditorUid === uid) ||
        (c.status === 'agreed'              && (c.pendingPartialAmount||0) > 0 && c.creditorUid === uid) ||
        (c.status === 'rejected'            && c.creditorUid === uid && !c.creditorDismissed)
      ));

      // Outgoing awaiting response
      A.sentClaims = all.filter(c =>
        c.status !== 'cancelled' && (
        // YOM creditor waiting for debtor response
        (c.status === 'pending'           && c.creditorUid === uid && c.type !== 'ioowe') ||
        // IOU debtor waiting for creditor response (they sent it)
        (c.status === 'pending'           && c.debtorUid   === uid && c.type === 'ioowe') ||
        (c.status === 'queried'           && c.debtorUid   === uid && !c.answeredQuestion)
        )
      );

      // Outstanding agreed debts
      A.ledger = all.filter(c => c.status === 'agreed' || c.status === 'accepted' || c.status === 'settlement_pending');
      A.settled = all.filter(c => c.status === 'settled');

      // Fully settled history
      A.settled = all.filter(c => c.status === 'settled');

      // Activity digest: on first load, check for changes since last open
      if (!A._activityChecked) {
        A._activityChecked = true;
        const lastOpenedMs = parseInt(localStorage.getItem('eweome_last_opened') || '0', 10);
        // Update last opened NOW so next session sees this session's activity
        localStorage.setItem('eweome_last_opened', Date.now().toString());
        if (lastOpenedMs > 0) {
          const uid2 = uid;
          // Raw events — only things OTHER people did
          const rawEvents = [];
          // Check for new simplification suggestions
          (A.simplifications || []).forEach(s => {
            const createdMs = s.createdAt?.toDate?.()?.getTime?.() || 0;
            if (createdMs > lastOpenedMs && s.consents?.[uid2] === null) {
              const others = s.participants.filter(p => p !== uid2)
                .map(p => (s.participantNames||{})[p] || 'someone').join(' and ');
              rawEvents.push({ eventType: 'simplification', otherName: others, amount: 0, claimId: s.id, status: 'pending_consent' });
            }
          });
          all.forEach(c => {
            const updatedMs = c.updatedAt?.toDate?.()?.getTime?.() || 0;
            if (updatedMs <= lastOpenedMs) return;
            const iAmCreditor = c.creditorUid === uid2;
            const iAmDebtor   = c.debtorUid   === uid2;
            const iAmSender   = (c.type !== 'ioowe' && iAmCreditor) || (c.type === 'ioowe' && iAmDebtor);
            const otherName   = iAmCreditor ? (c.debtorName || 'Someone') : (c.creditorName || 'Someone');
            const createdMs   = c.createdAt?.toDate?.()?.getTime?.() || 0;
            const isNew       = createdMs > lastOpenedMs;
            let eventType = null;
            if (isNew && !iAmSender) {
              // Normal claim sent to me
              if (c.groupId) {
                eventType = 'group_claim_debtor';
              } else {
                eventType = c.type === 'eweome' ? 'sent_yom' : 'sent_iou';
              }
            } else if (isNew && iAmSender && c.groupId) {
              // Group claim created on my behalf (I'm creditor but didn't send it)
              eventType = 'group_claim_creditor';
            } else if (!isNew) {
              switch (c.status) {
                case 'agreed':
                  if (!iAmSender) eventType = 'accepted'; break;
                case 'queried':
                  if (iAmSender && c.counterAmount)          eventType = 'countered';
                  else if (iAmSender && c.question)          eventType = 'questioned';
                  else if (!iAmSender && c.answeredQuestion) eventType = 'answered';
                  break;
                case 'rejected':
                  if (iAmSender) eventType = 'rejected'; break;
                case 'settlement_pending':
                  if (iAmCreditor) eventType = 'marked_paid'; break;
                case 'settled':
                  // Only show to debtor — creditor did the confirming themselves
                  if (iAmDebtor) eventType = 'settled'; break;
                case 'cancelled':
                  if (!iAmSender) eventType = 'cancelled'; break;
              }
            }
            if (eventType) rawEvents.push({ eventType, otherName, amount: c.amount, claimId: c.id, status: c.status, counterAmount: c.counterAmount });
          });

          // Collapse repeated events: group by (otherName, eventType)
          const groups = {};
          rawEvents.forEach(e => {
            const key = e.otherName + '||' + e.eventType;
            if (!groups[key]) groups[key] = { ...e, count: 0, total: 0, amounts: [] };
            groups[key].count++;
            groups[key].total += e.amount || 0;
            groups[key].amounts.push(e.amount);
          });

          const digest = Object.values(groups).map(g => {
            const n = g.otherName, c = g.count, t = fmt(g.total);
            let text;
            switch (g.eventType) {
              case 'sent_yom':          text = c > 1 ? n+' sent you '+c+' new requests totalling '+t : n+' sent you a YOM for '+fmt(g.amounts[0]); break;
              case 'sent_iou':          text = c > 1 ? n+' logged '+c+' IOUs to you totalling '+t     : n+' logged an IOU to you for '+fmt(g.amounts[0]); break;
              case 'group_claim_debtor':text = c > 1 ? 'Group settle-up: you owe '+n+' across '+c+' claims ('+t+' total)' : 'Group settle-up: you owe '+n+' '+fmt(g.amounts[0]); break;
              case 'group_claim_creditor': text = c > 1 ? 'Group settle-up: '+c+' claims created on your behalf ('+t+' total owed to you)' : 'Group settle-up: '+n+' owes you '+fmt(g.amounts[0]); break;
              case 'accepted':   text = c > 1 ? n+' accepted '+c+' of your claims ('+t+' total)' : n+' accepted your claim for '+fmt(g.amounts[0]); break;
              case 'countered':  text = n+' has countered a claim'; break;
              case 'questioned': text = c > 1 ? n+' has questions about '+c+' claims' : n+' has a question about your claim'; break;
              case 'answered':   text = n+' answered your question'; break;
              case 'rejected':   text = c > 1 ? n+' rejected '+c+' of your claims' : n+' rejected your claim for '+fmt(g.amounts[0]); break;
              case 'marked_paid':text = c > 1 ? n+' says they\'ve paid you '+c+' debts ('+t+' total)' : n+' says they\'ve paid you '+fmt(g.amounts[0]); break;
              case 'settled':    text = c > 1 ? n+' confirmed '+c+' debts as settled ('+t+' total)' : 'Your '+fmt(g.amounts[0])+' debt to '+n+' is now confirmed as settled'; break;
              case 'cancelled':  text = c > 1 ? n+' withdrew '+c+' claims' : n+' withdrew a claim for '+fmt(g.amounts[0]); break;
              case 'simplification': text = 'A debt simplification has been suggested involving you and '+n+' — tap to see it'; break;
              default:           text = 'Activity with '+n;
            }
            return { text, claimId: g.claimId, status: g.status, amount: g.total };
          });

          if (digest.length > 0) {
            A.activityDigest = digest;
            go('activity_digest');
            return;
          }
        }
      }

      if (!['loading','signin'].includes(A.screen)) render();
    });
  A._unsubs.push(u2);
}

/* ================================================================
   BOOTSTRAP
================================================================ */
auth.onAuthStateChanged(async fbUser => {
  if (fbUser) {
    A.user = fbUser;
    if (fbUser.phoneNumber && !fbUser.email) {
      const pn = fbUser.phoneNumber.replace(/\s/g,'');
      const snap = await db.collection('users_by_phone').doc(pn).get().catch(() => null);
      if (snap && snap.exists && snap.data().uid !== fbUser.uid) {
        A.mergeUid = snap.data().uid;
        A.mergeName = snap.data().displayName || '';
        // Look up existing account email for the hint
        try {
          const existingDoc = await db.collection('users').doc(A.mergeUid).get();
          A.mergeEmail = existingDoc.exists ? (existingDoc.data().email || '') : '';
        } catch(e) { A.mergeEmail = ''; }
        go('merge_accounts');
        return;
      }
    }
    await ensureUserDoc(fbUser);
    subscribeToData(fbUser.uid);
    requestNotificationPermission(fbUser.uid);
    if (window.AndroidBridge) {
      try { window.AndroidBridge.saveFcmToken(fbUser.uid); }
      catch(e) { console.log('FCM bridge call failed:', e); }
    }
    if (A.needsDisplayName) go('name_prompt');
    else if (A.needsOnboarding) go('onboarding');
    else if (!A.welcomeSeen && !localStorage.getItem('eweome_welcome_seen')) go('welcome');
    else if (hasNewFeaturesToShow()) go('whats_new');
    else {
      localStorage.setItem('eweome_last_seen_version', APP_VERSION);
      const restorable = ['home','position','pending','all_connections','notes','help','groups'];
      const last = localStorage.getItem('eweome_last_screen');
      go(last && restorable.includes(last) ? last : 'home');
    }
    // Will redirect to pending after data loads if needed
  } else {
    A.user        = null;
    A.userDoc     = null;
    A.connections = [];
    A.pendingClaims = A.sentClaims = A.ledger = [];
    go('signin');
  }
});

auth.getRedirectResult().then(result => {
  if (result && result.user) console.log('Redirect sign-in OK');
}).catch(e => { if (e.code !== 'auth/no-auth-event') console.warn('Redirect auth:', e.code); });

// Initial paint while Firebase checks auth state
render();
</script>
